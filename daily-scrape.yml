name: AFTS Monthly Report

# Runs on the 1st of every month at 07:00 UTC (~10:00 Athens).
# Generates the full monthly HTML + PDF companion + summary JSON for the
# month that just ended, then commits the outputs back to the repo so
# GitHub Pages serves them and the Apps Script mailer can dispatch.
#
# Manual trigger is also exposed (workflow_dispatch) so George can regenerate
# any past month by passing month_end=YYYY-MM-DD.

on:
  schedule:
    - cron: '0 7 1 * *'   # 07:00 UTC on day 1 of every month
  workflow_dispatch:
    inputs:
      month_end:
        description: 'Last day of target month (YYYY-MM-DD). Defaults to last day of previous month.'
        required: false

permissions:
  contents: write   # needed for the commit step

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Resolve target month_end
        id: month
        run: |
          if [ -n "${{ github.event.inputs.month_end }}" ]; then
            echo "month_end=${{ github.event.inputs.month_end }}" >> $GITHUB_OUTPUT
          else
            # Last day of the previous month, computed portably via GNU date.
            LAST_PREV=$(date -u -d "$(date -u +%Y-%m-01) -1 day" +%Y-%m-%d)
            echo "month_end=${LAST_PREV}" >> $GITHUB_OUTPUT
          fi
          echo "Using month_end=$(cat $GITHUB_OUTPUT | grep month_end | cut -d= -f2)"

      - name: Generate AFTS monthly report
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY:    ${{ secrets.OPENAI_API_KEY }}
        run: |
          python docs/build_monthly_report_afts.py \
            --month-end "${{ steps.month.outputs.month_end }}" \
            --xlsx     docs/data/recalls.xlsx

      - name: Commit outputs
        run: |
          git config --local user.email "fsis-bot@advfood.tech"
          git config --local user.name  "AFTS Intelligence System"
          git add 'docs/20*-M*.html' docs/data/monthly-summary-latest.json
          if git diff --staged --quiet; then
            echo "No monthly-report changes to commit."
          else
            git commit -m "AFTS Monthly Intelligence Report: ${{ steps.month.outputs.month_end }}"
            git push
          fi
