# pytest.ini — config for AFTS FSIS pipeline tests.
#
# Run from repo root:
#   pip install -r requirements-dev.txt
#   pytest
#
# Run with verbose output:
#   pytest -v
#
# Run a single file:
#   pytest tests/test_xlsx_merge.py
#
# Run a single test by name pattern:
#   pytest -k "weekly_rejected"

[pytest]
# Discover tests in the tests/ directory only — don't pick up pipeline/
# modules that happen to define test_* functions for ad-hoc use.
testpaths = tests

# Files matching this pattern are treated as test modules.
python_files = test_*.py

# Functions matching this pattern are test cases.
python_functions = test_*

# Friendly default output: short tracebacks + summary of passes/fails.
addopts =
    --tb=short
    --strict-markers
    -ra

# Mark slow tests so you can skip them with `pytest -m "not slow"`:
markers =
    slow: tests that touch the filesystem or take more than 1s
