name: English Feeds Collector (FSIS)

# Official-feed collector for English-speaking authorities. Pulls STRUCTURED
# recall data directly from authority APIs (no news scraping, no LLM, no
# Tailscale/VPS needed — classification is local keyword matching).
#
# Batch 5/6/7: UK (FSA), Scotland (FSS), Ireland (FSAI).
# All three are UK/Ireland time (London/Dublin = GMT/BST, same offset).
# Gate job pattern (same clean skip as the EU workflows).

on:
  schedule:
    - cron: '0 8 * * *'    # 08:00 UTC → 09:00 London/Dublin during BST/IST (summer)
    - cron: '0 9 * * *'    # 09:00 UTC → 09:00 London/Dublin during GMT (winter)
  workflow_dispatch:
    inputs:
      sources:
        description: 'Comma-separated source codes (default = all 3)'
        type: string
        default: 'uk,scotland,ireland'
      max_age_days:
        description: 'Max age in days for kept records'
        type: string
        default: '30'
      dry_run:
        description: 'Run but do not write to xlsx'
        type: boolean
        default: false

env:
  TZ: Europe/London

jobs:
  gate:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - id: check
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual dispatch — proceeding."
            echo "should_run=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          LONDON_HOUR=$(TZ=Europe/London date +%H)
          echo "Current Europe/London hour: ${LONDON_HOUR}"
          if [ "${LONDON_HOUR}" = "09" ]; then
            echo "It's 09:00 London — proceeding with English-feeds sweep."
            echo "should_run=true" >> $GITHUB_OUTPUT
          else
            echo "Not 09:00 London (other cron line handles current DST)."
            echo "should_run=false" >> $GITHUB_OUTPUT
          fi

  english-feeds:
    needs: gate
    if: needs.gate.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml openpyxl

      - name: Run English-speaking official feeds
        run: |
          ARGS=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then ARGS="--dry-run"; fi
          AGE="${{ inputs.max_age_days }}"
          if [ -z "$AGE" ]; then AGE="30"; fi

          SOURCES="${{ inputs.sources }}"
          if [ -z "$SOURCES" ]; then SOURCES="uk,scotland,ireland"; fi
          echo "Will run: $SOURCES"

          IFS=',' read -ra LIST <<< "$SOURCES"
          for s in "${LIST[@]}"; do
            s=$(echo "$s" | xargs)
            echo ""
            echo "======================================================================"
            echo "  STARTING source: $s"
            echo "======================================================================"
            python -m pipeline.official_feeds.main --source "$s" --max-age-days "$AGE" $ARGS \
              || echo "✗ $s failed (continuing)"
          done

      - name: Commit xlsx changes
        if: inputs.dry_run != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data/recalls.xlsx
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "English feeds collector: $(date -u +%Y-%m-%d) (UK+Scotland+Ireland)"
            git push
          fi
