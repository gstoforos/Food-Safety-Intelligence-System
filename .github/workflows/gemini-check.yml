name: FSIS Gemini Check (evening dissent reviewer)

# Daily ~20:00 Athens (FsisScheduler keys this on H=20 for idempotency).
# Runs after the evening gemini-url-gate (19:00) to provide a SECOND
# independent reviewer pass on rows added by the 18:00 daily-scrape.
#
# This is a DISSENT REVIEWER — same task as claude-check.py (verify each
# Pending row against its source URL) using identical prompts imported
# from review/claude_client.py, but routed through direct Google Gemini
# API instead of Anthropic. The morning Claude pass at 07:00 and this
# evening Gemini pass at 20:00 catch subtle errors a single reviewer
# might miss.
#
# Verdicts (same as claude-check):
#   pass → promote row to Recalls as-is
#   fix  → apply auto-corrections (Date / Company / Brand / Product) and promote
#   fail → keep in Pending with REJECTED status; surface for review
#
# Output:
#   - Verified rows promoted Pending → Recalls (xlsx + json)
#   - docs/daily/YYYY-MM-DD.html rebuilt for every date that gained rows
#   - docs/daily-index.json updated
#   - One git commit covering all of the above
#   - Audit stamps in xlsx Notes column read "[gemini-check 2026-MM-DD: pass; ...]"
#     so they're distinguishable from morning "[claude-check ...]" stamps
#     in the Thursday review.
#
# REPLACES: openrouter-check.yml (left in repo for emergency rollback).
#   OpenRouter's DeepSeek :free model was retired in DeepSeek's V4
#   transition (April 2026). All openrouter-check calls returned HTTP
#   404 for ~2 weeks → 0 promotions. Direct Gemini API has stable
#   model strings (Google manages deprecation cycles on 12+ month
#   notice) so the May 2026 incident cannot recur.
#
# COST: $0/month on free tier.
#   - Reviewer load: ~50 calls/day
#   - Free quota: 250 RPD on gemini-2.5-flash × 2 free keys = 500/day
#     primary pool; 1000 RPD on gemini-2.5-flash-lite × 2 keys =
#     2000/day fallback pool. Reviewer uses ~10% of primary pool, ~3%
#     of fallback pool.
#   - Paid spillover: deliberately impossible — the reviewer is wired
#     to use ONLY the two GEMINI_API_KEY_FREE* secrets. The paid
#     GEMINI_API_KEY is not passed to this workflow at all (see env:
#     block below — note its absence). If both free keys exhaust on
#     both models, calls return None and rows SKIP for retry next run.
#     Worst case: occasional missed reviews on heavy days, never an
#     unexpected bill.
#
# Concurrency: shares the `fsis-data-writers` group with merge-master,
# url-gate, daily-recall-search, claude-check, openrouter-check so
# writes never overlap.

on:
  workflow_dispatch:
    inputs:
      skip_days:
        description: "Skip Pending rows older than N days (default 0 = check all)"
        required: false
        default: "0"
      skip_commit:
        description: "true = run but do not commit/push (dry-run)"
        required: false
        default: "false"
      model:
        description: "Override GEMINI_REVIEWER_MODEL (default: gemini-2.5-flash)"
        required: false
        default: ""
      fallback_model:
        description: "Override GEMINI_REVIEWER_FALLBACK_MODEL (default: gemini-2.5-flash-lite)"
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: fsis-data-writers
  cancel-in-progress: false

jobs:
  gemini-check:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Athens-time guard (allows manual dispatch any hour;
                                  scheduled dispatch must be 19-23 Athens)
        id: guard
        run: |
          HOUR=$(TZ=Europe/Athens date +%H)
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # Manual or FsisScheduler dispatch: always allow
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "Dispatched at Athens ${HOUR}:xx — running."
          elif [ "$HOUR" -ge "19" ] && [ "$HOUR" -le "23" ]; then
            # Defensive: if a schedule trigger is added later, only
            # fire within the evening window
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "Outside 19-23:xx Athens window (now ${HOUR}:xx). Skipping."
          fi

      - name: Checkout
        if: steps.guard.outputs.run == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        if: steps.guard.outputs.run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        if: steps.guard.outputs.run == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run gemini_check
        if: steps.guard.outputs.run == 'true'
        # NOTE — only the two FREE Gemini keys are passed.
        # GEMINI_API_KEY (paid) is intentionally omitted from this env
        # block. The reviewer code in review/gemini_reviewer.py
        # (_collect_keys) reads ONLY GEMINI_API_KEY_FREE and
        # GEMINI_API_KEY_FREE_2 from the environment, so even if the
        # paid key were passed it would be ignored. This double-defence
        # makes accidental paid-tier spend impossible.
        #
        # ANTHROPIC_API_KEY is also intentionally omitted — the
        # underlying claude_check.py imports review.claude_client at
        # module load (for prompt constants), but since we monkey-patch
        # _verify_with_claude → _verify_with_gemini, no Anthropic API
        # call is ever made. Omitting the key prevents an accidental
        # fallback path through Anthropic if someone later edits the
        # patch logic.
        env:
          GEMINI_API_KEY_FREE:            ${{ secrets.GEMINI_API_KEY_FREE }}
          GEMINI_API_KEY_FREE_2:          ${{ secrets.GEMINI_API_KEY_FREE_2 }}
          GEMINI_REVIEWER_MODEL:          ${{ github.event.inputs.model || 'gemini-2.5-flash' }}
          GEMINI_REVIEWER_FALLBACK_MODEL: ${{ github.event.inputs.fallback_model || 'gemini-2.5-flash-lite' }}
          CLAUDE_CHECK_SKIP_DAYS:         ${{ github.event.inputs.skip_days || '0' }}
          SKIP_COMMIT:                    ${{ github.event.inputs.skip_commit || 'false' }}
          GH_TOKEN:                       ${{ secrets.GITHUB_TOKEN }}
          GIT_USER_EMAIL:                 "fsis-bot@advfood.tech"
          GIT_USER_NAME:                  "AFTS Intelligence System"
        run: |
          python -m pipeline.gemini_check

      - name: Summary
        if: steps.guard.outputs.run == 'true' && always()
        run: |
          echo "Gemini check complete — Athens $(TZ=Europe/Athens date)"
          echo "Recalls sheet rows: $(python -c "
          import openpyxl
          try:
              wb = openpyxl.load_workbook('docs/data/recalls.xlsx', read_only=True)
              if 'Recalls' in wb.sheetnames:
                  print(wb['Recalls'].max_row - 1)
              else:
                  print('(no Recalls sheet)')
          except Exception as e:
              print(f'(unreadable: {e})')
          ")"
