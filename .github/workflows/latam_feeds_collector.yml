# ═══════════════════════════════════════════════════════════════════════
#  MANUAL-DISPATCH ONLY.
#  This workflow is triggered EXCLUSIVELY by Apps Script
#  (FsisScheduler.gs → dispatchScheduled).
#  Do NOT add a 'schedule:' block here — schedules live in Apps Script
#  so the entire AFTS AI pipeline shares one source of truth.
# ═══════════════════════════════════════════════════════════════════════

name: Latin America official-feed collector

# ONE job that handles both scheduled (TZ-aware) and manual (all-at-once) runs.
# Cron times = 09:00 local time per country (most LATAM countries have no DST):
#   12:00 UTC = 09:00 UTC-3   (Brazil, Argentina)
#   13:00 UTC = 09:00 UTC-4   (Chile — UTC-3 during DST, but UTC-4 in winter)
#   14:00 UTC = 09:00 UTC-5   (Colombia, Peru)
#   15:00 UTC = 09:00 UTC-6   (Mexico)

on:
  workflow_dispatch:
    inputs:
      sources:
        description: 'Comma-separated sources (default: all 6)'
        default: 'brazil,mexico,argentina,chile,colombia,peru'
        required: false
      dry_run:
        description: 'Dry run (no xlsx write)'
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: latam-feeds-collector
  cancel-in-progress: false

jobs:
  collect:
    name: LATAM collector
    runs-on: ubuntu-latest
    steps:
      - name: Determine sources to run
        id: pick
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            SRC="${{ github.event.inputs.sources }}"
            echo "Manual run with sources: $SRC"
            echo "sources=$SRC" >> $GITHUB_OUTPUT
          else
            HOUR=$(date -u +%H)
            echo "Scheduled run at $HOUR:00 UTC"
            case "$HOUR" in
              12) SRC="brazil,argentina" ;;
              13) SRC="chile" ;;
              14) SRC="colombia,peru" ;;
              15) SRC="mexico" ;;
              *)  SRC="" ;;
            esac
            echo "Selected sources for $HOUR:00 UTC: $SRC"
            echo "sources=$SRC" >> $GITHUB_OUTPUT
          fi

      - uses: actions/checkout@v4
        with: { fetch-depth: 1 }

      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 openpyxl python-dateutil

      - name: Run collectors
        env:
          SOURCES: ${{ steps.pick.outputs.sources }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: |
          if [ -z "$SOURCES" ]; then
            echo "No sources to run (scheduled trigger didn't match a known UTC hour)"
            exit 0
          fi
          DRY=""
          [ "$DRY_RUN" = "true" ] && DRY="--dry-run"
          echo "$SOURCES" | tr ',' '\n' | while read -r SRC; do
            [ -z "$SRC" ] && continue
            echo ""
            echo "── Running source: $SRC ──"
            python -m pipeline.official_feeds.main --source "$SRC" --max-age-days 30 $DRY
          done

      - name: Commit + push
        if: github.event.inputs.dry_run != 'true'
        run: |
          git config user.name "afts-bot"
          git config user.email "afts-bot@users.noreply.github.com"
          git diff --quiet docs/data/recalls.xlsx && {
            echo "No xlsx changes"
            exit 0
          }
          git add docs/data/recalls.xlsx
          git commit -m "LATAM collector (${{ steps.pick.outputs.sources }}) — $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
