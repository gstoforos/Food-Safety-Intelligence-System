# ═══════════════════════════════════════════════════════════════════════
#  MANUAL-DISPATCH ONLY.
#  This workflow is triggered EXCLUSIVELY by Apps Script
#  (FsisScheduler.gs → dispatchScheduled).
#  Do NOT add a 'schedule:' block here — schedules live in Apps Script
#  so the entire AFTS AI pipeline shares one source of truth.
# ═══════════════════════════════════════════════════════════════════════

name: Scandinavian Gap Finder (FSIS)

# Consolidated workflow for 5 Nordic countries (Sweden, Norway, Denmark,
# Finland, Iceland). Two cron lines for DST. The 'gate' job runs first;
# only the matching DST cron triggers the main job (the other shows as
# "Skipped" cleanly, NOT failed).

on:
  workflow_dispatch:
    inputs:
      countries:
        description: 'Comma-separated country codes (default = all 5)'
        type: string
        default: 'se,no,dk,fi,is'
      skip_news:
        description: 'Skip news scraping'
        type: boolean
        default: false
      skip_verify:
        description: 'Skip article enrichment'
        type: boolean
        default: false
      dry_run:
        description: 'Run pipeline but do not write to xlsx'
        type: boolean
        default: false

env:
  TZ: Europe/Stockholm
  TS_KEY_RENEW_BY: "2026-08-21"

jobs:
  # Lightweight gate job — checks if the current cron line matches the
  # target local hour. workflow_dispatch always passes. The other cron
  # line shows as "Skipped" in GitHub UI (clean), not "Failed".
  gate:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - id: check
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual dispatch — proceeding."
            echo "should_run=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          STOCKHOLM_HOUR=$(TZ=Europe/Stockholm date +%H)
          echo "Current Europe/Stockholm hour: ${STOCKHOLM_HOUR}"
          if [ "${STOCKHOLM_HOUR}" = "21" ]; then
            echo "It's 21:00 Stockholm — proceeding with Nordic sweep."
            echo "should_run=true" >> $GITHUB_OUTPUT
          else
            echo "Not 21:00 Stockholm (other cron line handles current DST)."
            echo "should_run=false" >> $GITHUB_OUTPUT
          fi

  scandinavian-gap-finder:
    needs: gate
    if: needs.gate.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 40
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml openpyxl

      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}
          tags: tag:ci
          version: latest

      - name: Health-check llama-server on VPS
        env:
          LLAMA_BASE_URL: ${{ secrets.LLAMA_BASE_URL }}
        run: |
          echo "Pinging $LLAMA_BASE_URL/models..."
          for i in 1 2 3 4 5; do
            if curl -sf --max-time 10 "$LLAMA_BASE_URL/models" > /dev/null; then
              echo "✓ llama-server is reachable"
              exit 0
            fi
            echo "Attempt $i/5 failed, retrying in 5s..."
            sleep 5
          done
          echo "✗ llama-server unreachable after 5 attempts"
          exit 1

      - name: Run all 5 Nordic country pipelines sequentially
        env:
          LLAMA_BASE_URL: ${{ secrets.LLAMA_BASE_URL }}
        run: |
          ARGS=""
          if [ "${{ inputs.skip_news }}" = "true" ]; then ARGS="$ARGS --skip-news"; fi
          if [ "${{ inputs.skip_verify }}" = "true" ]; then ARGS="$ARGS --skip-verify"; fi
          if [ "${{ inputs.dry_run }}" = "true" ]; then ARGS="$ARGS --dry-run"; fi

          COUNTRIES="${{ inputs.countries }}"
          if [ -z "$COUNTRIES" ]; then COUNTRIES="se,no,dk,fi,is"; fi
          echo "Will run: $COUNTRIES"

          FAILED=""
          IFS=',' read -ra LIST <<< "$COUNTRIES"
          for cc in "${LIST[@]}"; do
            cc=$(echo "$cc" | xargs)
            echo ""
            echo "======================================================================"
            echo "  STARTING country: $cc"
            echo "======================================================================"
            if python -m pipeline.gap_finder.main --country "$cc" --verbose $ARGS; then
              echo "✓ $cc completed"
            else
              echo "✗ $cc failed (continuing)"
              FAILED="$FAILED $cc"
            fi
          done

          if [ -n "$FAILED" ]; then
            echo ""
            echo "WARNING: Some countries failed:$FAILED"
          fi

      - name: Upload per-country artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scandinavian-gap-finder-run-${{ github.run_id }}
          path: |
            docs/data/gap_finder_se/
            docs/data/gap_finder_no/
            docs/data/gap_finder_dk/
            docs/data/gap_finder_fi/
            docs/data/gap_finder_is/
          retention-days: 14

      - name: Commit xlsx changes
        if: inputs.dry_run != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data/recalls.xlsx \
                  docs/data/gap_finder_se/ \
                  docs/data/gap_finder_no/ \
                  docs/data/gap_finder_dk/ \
                  docs/data/gap_finder_fi/ \
                  docs/data/gap_finder_is/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Nordic gap finder: $(date -u +%Y-%m-%d) auto-update (5 countries)"
            git push
          fi
