name: North America Feeds Collector (FSIS)

# Official-feed collector for US + Canada authorities (Batch 6).
# Pulls structured recall data directly from authority APIs (no scraping):
#   us_fda   — openFDA food enforcement (seafood/produce/dairy/packaged)
#   us_fsis  — USDA FSIS recall API (meat/poultry/egg; URL-dedup vs core platform)
#   canada   — CFIA / Health Canada open data (filtered to food)
# Each also runs a Google News pass (date-named + when:7d + recall-signal gate).
# Gate-job pattern; runs 09:00 America/New_York.

on:
  schedule:
    - cron: '0 13 * * *'   # 13:00 UTC → 09:00 New York during EDT (summer)
    - cron: '0 14 * * *'   # 14:00 UTC → 09:00 New York during EST (winter)
  workflow_dispatch:
    inputs:
      sources:
        description: 'Comma-separated source codes (default = all 3)'
        type: string
        default: 'us_fda,us_fsis,canada'
      max_age_days:
        description: 'Max age in days for kept records'
        type: string
        default: '30'
      dry_run:
        description: 'Run but do not write to xlsx'
        type: boolean
        default: false

env:
  TZ: America/New_York

jobs:
  gate:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - id: check
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual dispatch — proceeding."
            echo "should_run=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          NY_HOUR=$(TZ=America/New_York date +%H)
          echo "Current America/New_York hour: ${NY_HOUR}"
          if [ "${NY_HOUR}" = "09" ]; then
            echo "It's 09:00 New York — proceeding with North America sweep."
            echo "should_run=true" >> $GITHUB_OUTPUT
          else
            echo "Not 09:00 New York (other cron line handles current DST)."
            echo "should_run=false" >> $GITHUB_OUTPUT
          fi

  north-america-feeds:
    needs: gate
    if: needs.gate.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml openpyxl

      - name: Run North America official feeds
        run: |
          ARGS=""
          if [ "${{ inputs.dry_run }}" = "true" ]; then ARGS="--dry-run"; fi
          AGE="${{ inputs.max_age_days }}"
          if [ -z "$AGE" ]; then AGE="30"; fi

          SOURCES="${{ inputs.sources }}"
          if [ -z "$SOURCES" ]; then SOURCES="us_fda,us_fsis,canada"; fi
          echo "Will run: $SOURCES"

          IFS=',' read -ra LIST <<< "$SOURCES"
          for s in "${LIST[@]}"; do
            s=$(echo "$s" | xargs)
            echo ""
            echo "======================================================================"
            echo "  STARTING source: $s"
            echo "======================================================================"
            python -m pipeline.official_feeds.main --source "$s" --max-age-days "$AGE" $ARGS \
              || echo "✗ $s failed (continuing)"
          done

      - name: Commit xlsx changes
        if: inputs.dry_run != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data/recalls.xlsx
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "North America feeds collector: $(date -u +%Y-%m-%d) (FDA+FSIS+CFIA)"
            git push
          fi
