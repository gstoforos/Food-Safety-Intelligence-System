# AFTS Food Safety Intelligence — North America Feeds Collector
#
# Manual-only. Triggered exclusively via:
#   - GitHub UI "Run workflow" button
#   - GitHub workflow_dispatch REST API (called from AFTS Apps Script)
#
# No cron schedule. Does NOT auto-fire. Will not interfere with the
# existing scrape pipelines (morning-critical, daily-scrape,
# north-america-daily, etc.).

name: "FSIS NA — feeds collector (us_fda, us_fsis, canada) [manual]"

on:
  workflow_dispatch:
    inputs:
      sources:
        description: "Comma-separated source IDs"
        required: false
        default: "us_fda,us_fsis,canada"
      dry_run:
        description: "Dry run? (true|false)"
        required: false
        default: "false"

# Serialize with other xlsx-writers so we never race the main pipeline.
concurrency:
  group: fsis-data-writers
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          pip install --quiet \
            requests beautifulsoup4 lxml openpyxl python-dateutil feedparser

      - name: Tailscale up
        uses: tailscale/github-action@v3
        with:
          authkey:  ${{ secrets.TAILSCALE_AUTHKEY }}
          hostname: github-actions-${{ github.run_id }}
          tags:    "tag:ci"

      - name: Verify Llama VPS + Searx reachable
        env:
          LLAMA_BASE_URL: ${{ secrets.LLAMA_BASE_URL }}
          SEARX_URL:      ${{ secrets.SEARX_URL }}
        run: |
          echo "▶ Llama health:"
          BASE="${LLAMA_BASE_URL%/v1}"
          curl -fsS --max-time 10 "$BASE/v1/models" | head -c 300 || \
            (echo "Llama not reachable"; exit 1)
          echo ""
          echo "▶ Searx health:"
          curl -fsS --max-time 10 "$SEARX_URL?q=test&format=json" | head -c 200 || \
            (echo "Searx not reachable"; exit 1)
          echo ""

      - name: Run NA collector (one source at a time)
        env:
          LLAMA_BASE_URL: ${{ secrets.LLAMA_BASE_URL }}
          LLAMA_MODEL:    qwen2.5-7b-instruct
          SEARX_URL:      ${{ secrets.SEARX_URL }}
        run: |
          SOURCES="${{ github.event.inputs.sources || 'us_fda,us_fsis,canada' }}"
          DRY="${{ github.event.inputs.dry_run || 'false' }}"
          EXTRA=""
          if [ "$DRY" = "true" ]; then EXTRA="--dry-run"; fi
          for SRC in $(echo "$SOURCES" | tr ',' ' '); do
            echo ""
            echo "════════════════════════════════════════════════════════"
            echo "  Source: $SRC"
            echo "════════════════════════════════════════════════════════"
            python -m pipeline.official_feeds.main --source "$SRC" $EXTRA
          done

      - name: Commit xlsx changes
        if: github.event.inputs.dry_run != 'true'
        run: |
          git config user.name  "afts-bot"
          git config user.email "[email protected]"
          git add docs/data/recalls.xlsx || true
          if git diff --cached --quiet; then
            echo "no changes"
          else
            git commit -m "NA collector (manual): $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          fi
