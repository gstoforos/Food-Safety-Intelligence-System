name: FSIS OpenAI Gap Finder

# Daily at 12:00 ATHENS TIME — OpenAI gpt-4o-mini as a gap-finder.
# Fills the midday slot between morning scrape (08:00) and Gemini (14:00).
# Single global query: ~$0.01/run (~€0.065/week).
#
# Two DST crons + Athens hour guard.

on:
  schedule:
    - cron: '0 9 * * *'    # 12:00 Athens EEST (summer UTC+3)
    - cron: '0 10 * * *'   # 12:00 Athens EET  (winter UTC+2)
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: fsis-data-writers
  cancel-in-progress: false

jobs:
  openai-gap:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Athens-time guard (11-13:xx window)
        id: guard
        run: |
          HOUR=$(TZ=Europe/Athens date +%H)
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          elif [ "$HOUR" = "11" ] || [ "$HOUR" = "12" ] || [ "$HOUR" = "13" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "Not 12:xx Athens (now ${HOUR}:xx). Skipping."
          fi

      - name: Checkout
        if: steps.guard.outputs.run == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        if: steps.guard.outputs.run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        if: steps.guard.outputs.run == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run OpenAI gap-finder
        if: steps.guard.outputs.run == 'true'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GIT_USER_EMAIL: "fsis-bot@advfood.tech"
          GIT_USER_NAME: "FSIS Bot"
        run: python -m pipeline.gap_finder_openai

      - name: Summary
        if: steps.guard.outputs.run == 'true' && always()
        run: echo "OpenAI gap-finder complete — Athens $(TZ=Europe/Athens date)"
