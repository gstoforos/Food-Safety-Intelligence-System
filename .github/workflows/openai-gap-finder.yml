name: FSIS OpenAI Gap Finder

# Daily at 12:00 ATHENS TIME — OpenAI gpt-4o-mini as a gap-finder.
# Fills the midday slot between morning scrape (08:00) and Gemini (14:00).
# Single global query: ~$0.01/run (~€0.065/week).
#
# Two DST crons + Athens hour guard.

on:
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: fsis-data-writers
  cancel-in-progress: false

jobs:
  openai-gap:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Athens-time guard (11-13:xx window)
        id: guard
        run: |
          HOUR=$(TZ=Europe/Athens date +%H)
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          elif [ "$HOUR" -ge "10" ] && [ "$HOUR" -le "16" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "Not 12:xx Athens (now ${HOUR}:xx). Skipping."
          fi

      - name: Checkout
        if: steps.guard.outputs.run == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        if: steps.guard.outputs.run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        if: steps.guard.outputs.run == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run OpenAI gap-finder
        if: steps.guard.outputs.run == 'true'
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GIT_USER_EMAIL: "fsis-bot@advfood.tech"
          GIT_USER_NAME: "FSIS Bot"
        run: python -m pipeline.gap_finder_openai
      - name: Gemini URL Gate + Merge
        if: steps.guard.outputs.run == 'true'
        env:
          GEMINI_API_KEY:    ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY_1:  ${{ secrets.GEMINI_API_KEY_1 }}
          GEMINI_API_KEY_2:  ${{ secrets.GEMINI_API_KEY_2 }}
          GEMINI_API_KEY_3:  ${{ secrets.GEMINI_API_KEY_3 }}
          GEMINI_API_KEY_4:  ${{ secrets.GEMINI_API_KEY_4 }}
          GEMINI_API_KEY_5:  ${{ secrets.GEMINI_API_KEY_5 }}
          GEMINI_MODEL:      ${{ vars.GEMINI_MODEL || 'gemini-2.5-flash' }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GIT_USER_EMAIL: "fsis-bot@advfood.tech"
          GIT_USER_NAME: "FSIS Bot"
        run: |
          python -m pipeline.url_gate_gemini
          python -m pipeline.merge_master

      - name: Summary
        if: steps.guard.outputs.run == 'true' && always()
        run: echo "OpenAI gap-finder complete — Athens $(TZ=Europe/Athens date)"
