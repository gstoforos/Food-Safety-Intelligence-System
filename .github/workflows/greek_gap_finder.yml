# ═══════════════════════════════════════════════════════════════════════
#  MANUAL-DISPATCH ONLY.
#  This workflow is triggered EXCLUSIVELY by Apps Script
#  (FsisScheduler.gs → dispatchScheduled).
#  Do NOT add a 'schedule:' block here — schedules live in Apps Script
#  so the entire AFTS AI pipeline shares one source of truth.
# ═══════════════════════════════════════════════════════════════════════

name: Greek Gap Finder (FSIS)

# Cron times in UTC. Athens = EEST (summer) / EET (winter).
# 21:00 Athens local = 18:00 UTC (EEST) or 19:00 UTC (EET).
# Gate job ensures only the matching DST cron triggers the main job
# (other cron line shows as "Skipped" cleanly, not "Failed").

on:
  workflow_dispatch:
    inputs:
      skip_news:
        description: 'Skip news scraping (use existing candidates.jsonl)'
        type: boolean
        default: false
      skip_verify:
        description: 'Skip article enrichment'
        type: boolean
        default: false
      dry_run:
        description: 'Run pipeline but do not write to xlsx'
        type: boolean
        default: false

env:
  TZ: Europe/Athens
  TS_KEY_RENEW_BY: "2026-08-21"

jobs:
  gate:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - id: check
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual dispatch — proceeding."
            echo "should_run=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          LOCAL_HOUR=$(TZ=Europe/Athens date +%H)
          echo "Current Europe/Athens hour: ${LOCAL_HOUR}"
          if [ "${LOCAL_HOUR}" = "21" ]; then
            echo "It's 21:00 Athens — proceeding."
            echo "should_run=true" >> $GITHUB_OUTPUT
          else
            echo "Not 21:00 Athens (other cron line handles current DST)."
            echo "should_run=false" >> $GITHUB_OUTPUT
          fi

  gap-finder-gr:
    needs: gate
    if: needs.gate.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml openpyxl

      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}
          tags: tag:ci
          version: latest

      - name: Health-check llama-server on VPS
        env:
          LLAMA_BASE_URL: ${{ secrets.LLAMA_BASE_URL }}
        run: |
          echo "Pinging $LLAMA_BASE_URL/models..."
          for i in 1 2 3 4 5; do
            if curl -sf --max-time 10 "$LLAMA_BASE_URL/models" > /dev/null; then
              echo "✓ llama-server is reachable"
              exit 0
            fi
            echo "Attempt $i/5 failed, retrying in 5s..."
            sleep 5
          done
          echo "✗ llama-server unreachable after 5 attempts"
          exit 1

      - name: Run Greek gap finder pipeline
        env:
          LLAMA_BASE_URL: ${{ secrets.LLAMA_BASE_URL }}
        run: |
          ARGS=""
          if [ "${{ inputs.skip_news }}" = "true" ]; then ARGS="$ARGS --skip-news"; fi
          if [ "${{ inputs.skip_verify }}" = "true" ]; then ARGS="$ARGS --skip-verify"; fi
          if [ "${{ inputs.dry_run }}" = "true" ]; then ARGS="$ARGS --dry-run"; fi
          echo "Running: python -m pipeline.gap_finder.main --country gr --verbose $ARGS"
          python -m pipeline.gap_finder.main --country gr --verbose $ARGS

      - name: Upload run artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gap-finder-gr-run-${{ github.run_id }}
          path: docs/data/gap_finder_gr/
          retention-days: 14

      - name: Commit xlsx changes
        if: inputs.dry_run != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data/recalls.xlsx docs/data/gap_finder_gr/
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Greek gap finder: $(date -u +%Y-%m-%d) auto-update"

          # ── Race-safe push ────────────────────────────────────────────
          # Multiple data-writer workflows (other gap-finders, NA collector,
          # news-feed, merge-master) push to main concurrently. A naive
          # `git push` loses to whoever pushed first with:
          #   ! [rejected] main -> main (fetch first)
          # Binary xlsx files can't be git-merged, so on rejection we:
          #   1. stash our just-committed xlsx (soft reset keeps it staged)
          #   2. pull the remote (fast-forward — gets others' rows)
          #   3. re-apply OUR rows via pipeline.xlsx_merge (row-union, never
          #      clobbers existing rows — same module fsis-url-guardian +
          #      merge-master use)
          #   4. re-commit + retry push
          # Up to 5 attempts. This mirrors the row-union protection used by
          # every other xlsx writer in the repo; gap-finders previously
          # lacked it, which is the bug that caused the rejected push.
          PUSHED=0
          for attempt in 1 2 3 4 5; do
            if git push; then
              echo "✓ pushed on attempt $attempt"
              PUSHED=1
              break
            fi
            echo "push attempt $attempt rejected — syncing remote and row-merging"

            # Save our xlsx aside, hard-reset to remote, row-union merge back.
            cp docs/data/recalls.xlsx /tmp/ours_recalls.xlsx
            git reset --hard HEAD~1            # drop our commit, keep history clean
            git pull --rebase --autostash origin main || git pull --no-rebase origin main

            # Row-union our rows back into the freshly-pulled xlsx.
            # xlsx_merge CLI is positional: <remote> <ours> <out>.
            # After the pull, docs/data/recalls.xlsx IS the remote copy;
            # /tmp/ours_recalls.xlsx holds the rows we just produced.
            # Exit code 3 = no-shrink canary tripped (merge would lose
            # rows) — treat as hard failure, do NOT clobber with our copy.
            set +e
            python -m pipeline.xlsx_merge \
                docs/data/recalls.xlsx \
                /tmp/ours_recalls.xlsx \
                docs/data/recalls.xlsx
            MERGE_RC=$?
            set -e
            if [ "$MERGE_RC" -eq 0 ]; then
              echo "  row-union merge ok"
            elif [ "$MERGE_RC" -eq 3 ]; then
              echo "  ✗ xlsx_merge no-shrink canary tripped — aborting" >&2
              exit 1
            else
              echo "  ✗ xlsx_merge failed (rc=$MERGE_RC) — aborting" >&2
              exit 1
            fi

            git add docs/data/recalls.xlsx docs/data/gap_finder_gr/
            git commit -m "Greek gap finder: $(date -u +%Y-%m-%d) auto-update (merge attempt $attempt)"
            sleep $((attempt * 2))
          done

          if [ "$PUSHED" -ne 1 ]; then
            echo "✗ push failed after 5 attempts" >&2
            exit 1
          fi
