name: FSIS URL Guardian (4-hourly)

# Runs every 4 hours to:
#   1. Validate URLs in docs/data/recalls.xlsx (blanks truly-broken, keeps bot-blocks)
#   2. Ask OpenAI for missing recalls per major agency (gap-finder, last 3 days)
#   3. Optional Claude Haiku spot-check on Tier-1 rows
#   4. Commit updated xlsx + json back to the repo
#
# Lightweight by design: 1 LLM call per agency (8 agencies max), ~$0.05/run.
# The heavier full scrape keeps its own daily schedule.

on:
  schedule:
    # Runs at :15 past every 4 hours (Athens: 03:15, 07:15, 11:15, 15:15,
    # 19:15, 23:15) — OFFSET FROM :00 so the hourly news-feed and :05
    # merge-master have already finished their push before we start.
    # Combined with the fsis-data-writers concurrency group below, this
    # eliminates the "non-fast-forward" push race that used to fail every
    # 4 hours when the Guardian ran at the top of the hour alongside
    # news-feed and merge-master.
    - cron: '15 */4 * * *'       # :15 past 00/04/08/12/16/20 UTC
  workflow_dispatch:
    inputs:
      since_days:
        description: "URL-check window in days"
        required: false
        default: "14"
      gap_days:
        description: "Gap-finder window in days"
        required: false
        default: "3"
      skip_ai:
        description: "Skip OpenAI/Claude passes (true/false)"
        required: false
        default: "false"

permissions:
  contents: write

concurrency:
  # IMPORTANT: share fsis-data-writers with every other workflow that
  # modifies docs/data/recalls.xlsx or recalls.json. Having our own group
  # (fsis-url-guardian) let this workflow race news-feed / merge-master
  # and lose the push → "non-fast-forward" → workflow failure. Joining
  # the shared group means GitHub queues us behind any in-flight writer.
  group: fsis-data-writers
  cancel-in-progress: false

jobs:
  guardian:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install openpyxl requests

      - name: Run URL Guardian
        shell: bash
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GUARDIAN_SINCE_DAYS: ${{ github.event.inputs.since_days || '14' }}
          GUARDIAN_GAP_DAYS: ${{ github.event.inputs.gap_days || '3' }}
          GUARDIAN_SKIP_AI: ${{ github.event.inputs.skip_ai || 'false' }}
          PYTHONUNBUFFERED: "1"
        run: |
          set -euo pipefail
          echo "== Workspace layout =="
          ls -la
          echo "== docs/data/ =="
          ls -la docs/data/ || echo "docs/data/ does not exist"
          echo "== Running guardian =="
          python -m pipeline.url_guardian \
            --xlsx docs/data/recalls.xlsx \
            --json docs/data/recalls.json

      - name: Commit updated dataset
        shell: bash
        run: |
          set -euo pipefail
          git config --local user.email "fsis-bot@advfood.tech"
          git config --local user.name  "FSIS Bot"
          git add docs/data/recalls.xlsx docs/data/recalls.json || true
          if git diff --staged --quiet; then
            echo "No changes this cycle."
            exit 0
          fi
          git commit -m "URL guardian + gap-finder @ $(date -u +'%Y-%m-%d %H:%M UTC')"

          # Retry loop: if another writer pushed between our checkout and
          # now, our push fails with non-fast-forward. Rebase onto remote
          # and try again. 3 attempts covers almost all realistic races;
          # we stash-and-pop our staged change on top of a fresh remote.
          for attempt in 1 2 3; do
            if git push; then
              echo "Push succeeded on attempt $attempt."
              exit 0
            fi
            echo "Push attempt $attempt failed — rebasing onto remote and retrying..."
            git pull --rebase --autostash origin "$(git branch --show-current)"
            sleep $((attempt * 5))
          done
          echo "ERROR: git push failed after 3 rebase attempts."
          exit 1

      - name: Upload run artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fsis-guardian-${{ github.run_id }}
          path: |
            docs/data/recalls.xlsx
            docs/data/recalls.json
          retention-days: 7
