name: FSIS Tavily Gap Finder

# Daily at 14:00 ATHENS TIME — runs AFTER:
#   - 07:30 Athens: Claude URL gate
#   - 08:00 Athens: morning critical-agency scrape
#   - 08:30 Athens: Gemini gap-finder (FREE, Google Search grounding)
#   - 10:00 Athens: OpenAI gap-finder (training-data only)
#
# Tavily's job is to fill gaps the others missed using Tavily's independent
# AI-optimized search index. Whitelisted regulator-domain-only; Gemini (free)
# extracts structured fields from each search result.
#
# Cost: $0 — Tavily free tier 1,000 searches/month (we use ~90/month),
# Gemini free tier 1,500 req/day per key.
#
# Two DST crons + Athens hour guard.

on:
  schedule:
    - cron: '0 11 * * *'   # 14:00 Athens EEST (summer UTC+3)
    - cron: '0 12 * * *'   # 14:00 Athens EET  (winter UTC+2)
  workflow_dispatch:
    inputs:
      since_days:
        description: "Days to look back"
        required: false
        default: "7"

permissions:
  contents: write

concurrency:
  group: fsis-data-writers
  cancel-in-progress: false

jobs:
  gap-finder-tavily:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Athens-time guard (14:xx)
        id: guard
        run: |
          HOUR=$(TZ=Europe/Athens date +%H)
          echo "athens_hour=$HOUR"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          elif [ "$HOUR" = "14" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "Not 14:xx Athens (now ${HOUR}:xx). Skipping."
          fi

      - name: Checkout
        if: steps.guard.outputs.run == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        if: steps.guard.outputs.run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        if: steps.guard.outputs.run == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Tavily gap-finder
        if: steps.guard.outputs.run == 'true'
        env:
          TAVILY_API_KEY:    ${{ secrets.TAVILY_API_KEY }}
          GEMINI_API_KEY:    ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY_1:  ${{ secrets.GEMINI_API_KEY_1 }}
          GEMINI_API_KEY_2:  ${{ secrets.GEMINI_API_KEY_2 }}
          GEMINI_API_KEY_3:  ${{ secrets.GEMINI_API_KEY_3 }}
          GEMINI_API_KEY_4:  ${{ secrets.GEMINI_API_KEY_4 }}
          GEMINI_API_KEY_5:  ${{ secrets.GEMINI_API_KEY_5 }}
          GAP_SINCE_DAYS:    ${{ github.event.inputs.since_days || '7' }}
          SKIP_COMMIT:       "false"
          GH_TOKEN:          ${{ secrets.GITHUB_TOKEN }}
          GIT_USER_EMAIL:    "fsis-bot@advfood.tech"
          GIT_USER_NAME:     "FSIS Bot"
        run: |
          python -m pipeline.gap_finder_tavily

      - name: Summary
        if: steps.guard.outputs.run == 'true' && always()
        run: |
          echo "Tavily gap-finder complete — Athens $(TZ=Europe/Athens date)."
