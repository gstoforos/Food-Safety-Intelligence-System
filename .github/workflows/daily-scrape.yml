name: FSIS Daily Scrape

# Full 66-agency scrape at 17:00 ATHENS TIME (not UTC).
# Pairs with morning-critical-scrape.yml which runs at 08:00 Athens.
# Two DST crons + hour guard so the correct one fires year-round.

on:
  workflow_dispatch:
    inputs:
      since_days:
        description: "Days to look back"
        required: false
        default: "30"
      skip_ai:
        description: "Skip AI enrichment (true/false)"
        required: false
        default: "false"

permissions:
  contents: write

concurrency:
  group: fsis-data-writers
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write

    steps:
      - name: Athens-time guard (17-19:xx window)
        id: guard
        run: |
          HOUR=$(TZ=Europe/Athens date +%H)
          echo "athens_hour=$HOUR"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          elif [ "$HOUR" -ge "16" ] && [ "$HOUR" -le "22" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "Not 17:xx Athens (now ${HOUR}:xx). Skipping."
          fi

      - name: Checkout
        if: steps.guard.outputs.run == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        if: steps.guard.outputs.run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        if: steps.guard.outputs.run == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pipeline
        if: steps.guard.outputs.run == 'true'
        env:
          # Gemini: singular (current AFTS setup) + numbered slots for future rotation.
          GEMINI_API_KEY:    ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY_1:  ${{ secrets.GEMINI_API_KEY_1 }}
          GEMINI_API_KEY_2:  ${{ secrets.GEMINI_API_KEY_2 }}
          GEMINI_API_KEY_3:  ${{ secrets.GEMINI_API_KEY_3 }}
          GEMINI_API_KEY_4:  ${{ secrets.GEMINI_API_KEY_4 }}
          GEMINI_API_KEY_5:  ${{ secrets.GEMINI_API_KEY_5 }}
          OPENAI_API_KEY:    ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SINCE_DAYS:   ${{ github.event.inputs.since_days || '30' }}
          MAX_PARALLEL: "8"
          SKIP_AI:      ${{ github.event.inputs.skip_ai || 'false' }}
          SKIP_REVIEW:  "false"
          SKIP_COMMIT:  "false"
          GH_TOKEN:     ${{ secrets.GITHUB_TOKEN }}
          GIT_USER_EMAIL: "fsis-bot@advfood.tech"
          GIT_USER_NAME:  "FSIS Bot"
        run: |
          python -m pipeline.run_all

      - name: Claude URL Gate + Merge
        if: steps.guard.outputs.run == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GIT_USER_EMAIL: "fsis-bot@advfood.tech"
          GIT_USER_NAME: "FSIS Bot"
        run: |
          python -m pipeline.url_gate_claude
          python -m pipeline.merge_master

      - name: Upload run log artifact
        if: steps.guard.outputs.run == 'true' && always()
        uses: actions/upload-artifact@v4
        with:
          name: fsis-run-log-${{ github.run_id }}
          path: |
            docs/data/recalls.xlsx
            docs/data/recalls.json
          retention-days: 14
