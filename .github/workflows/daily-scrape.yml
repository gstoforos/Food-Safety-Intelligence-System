name: FSIS Daily Scrape

on:
  schedule:
    # Daily at 17:00 UTC (5 PM UTC)
    - cron: '0 17 * * *'
  workflow_dispatch:  # Allow manual trigger from Actions tab
    inputs:
      since_days:
        description: "Days to look back"
        required: false
        default: "30"
      skip_ai:
        description: "Skip AI enrichment (true/false)"
        required: false
        default: "false"

permissions:
  contents: write

concurrency:
  group: fsis-data-writers
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write  # required to push commits

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run pipeline
        env:
          # Gemini free-tier keys (rotate up to 5)
          GEMINI_API_KEY_1: ${{ secrets.GEMINI_API_KEY_1 }}
          GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
          GEMINI_API_KEY_3: ${{ secrets.GEMINI_API_KEY_3 }}
          GEMINI_API_KEY_4: ${{ secrets.GEMINI_API_KEY_4 }}
          GEMINI_API_KEY_5: ${{ secrets.GEMINI_API_KEY_5 }}
          # Paid review pass
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          # Optional 3rd reviewer (free tier)
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # Pipeline config
          SINCE_DAYS: ${{ github.event.inputs.since_days || '30' }}
          MAX_PARALLEL: "8"
          SKIP_AI: ${{ github.event.inputs.skip_ai || 'false' }}
          SKIP_REVIEW: "false"
          SKIP_COMMIT: "false"
          # Git push (uses GITHUB_TOKEN automatically when using actions/checkout)
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GIT_USER_EMAIL: "fsis-bot@advfood.tech"
          GIT_USER_NAME: "FSIS Bot"
        run: |
          python -m pipeline.run_all

      - name: Upload run log artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: fsis-run-log-${{ github.run_id }}
          path: |
            docs/data/recalls.xlsx
            docs/data/recalls.json
          retention-days: 14
