# ═══════════════════════════════════════════════════════════════════════
#  MANUAL-DISPATCH ONLY.
#  This workflow is triggered EXCLUSIVELY by Apps Script
#  (FsisScheduler.gs → dispatchScheduled).
#  Do NOT add a 'schedule:' block here — schedules live in Apps Script
#  so the entire AFTS AI pipeline shares one source of truth.
# ═══════════════════════════════════════════════════════════════════════

name: Africa Gap Finder (FSIS)

# Consolidated workflow for African countries that publish
# per-recall authority pages the Greece way (verified individually before
# wiring). SAST (UTC+2) and WAT (UTC+1) have NO DST, so a single cron per
# country suffices; the gate job ensures the run only proceeds at 21:00 local
# triggers the main job (the other shows "Skipped").
#
# Verified & wired:
#   cz  Czechia (SZPI — potravinynapranyri.cz, /Detail.aspx?id=)
#   hr  Croatia (HAPIH — hapih.hr, /opoziv-<slug>/)
#   ee  Estonia (PTA — pta.agri.ee, /<slug>-tagasikutsumine)
#   mk  North Macedonia (FVA — fva.gov.mk, /<id>-povlekuvanje|otpovikuvanje-<slug>)
#   md  Moldova (ANSA — ansa.gov.md, /media/rechemare-retragere/<slug>.html)
#   ba  Bosnia (FSA BiH — fsa.gov.ba, /obavijest-o-povlacenju...<slug>/)
#
# (Additional Africa countries are added here only after their authority is
#  verified to publish per-recall HTML pages — same discipline as Greece.)

on:
  workflow_dispatch:
    inputs:
      countries:
        description: 'Comma-separated country codes (default = all verified)'
        type: string
        default: 'za,ng'
      skip_news:
        description: 'Skip news scraping'
        type: boolean
        default: false
      skip_verify:
        description: 'Skip article enrichment'
        type: boolean
        default: false
      dry_run:
        description: 'Run pipeline but do not write to xlsx'
        type: boolean
        default: false

env:
  TZ: Africa/Johannesburg
  TS_KEY_RENEW_BY: "2026-08-21"

permissions:
  contents: write

jobs:
  gate:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - id: check
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Manual dispatch — proceeding."
            echo "should_run=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          LOCAL_HOUR=$(TZ=Africa/Johannesburg date +%H)
          echo "Current Africa/Johannesburg hour: ${LOCAL_HOUR}"
          if [ "${LOCAL_HOUR}" = "21" ]; then
            echo "It's 21:00 SAST — proceeding with Africa sweep."
            echo "should_run=true" >> $GITHUB_OUTPUT
          else
            echo "Not 21:00 SAST — skipping (gate)."
            echo "should_run=false" >> $GITHUB_OUTPUT
          fi

  africa-gap-finder:
    needs: gate
    if: needs.gate.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 50
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}
          tags: tag:ci
          version: latest

      - name: Health-check llama-server on VPS
        env:
          LLAMA_BASE_URL: ${{ secrets.LLAMA_BASE_URL }}
        run: |
          echo "Pinging $LLAMA_BASE_URL/models..."
          for i in 1 2 3 4 5; do
            if curl -sf --max-time 10 "$LLAMA_BASE_URL/models" > /dev/null; then
              echo "✓ llama-server is reachable"
              exit 0
            fi
            echo "Attempt $i/5 failed, retrying in 5s..."
            sleep 5
          done
          echo "✗ llama-server unreachable after 5 attempts"
          exit 1

      - name: Run all verified Africa country pipelines sequentially
        env:
          LLAMA_BASE_URL: ${{ secrets.LLAMA_BASE_URL }}
        run: |
          ARGS=""
          if [ "${{ inputs.skip_news }}" = "true" ]; then ARGS="$ARGS --skip-news"; fi
          if [ "${{ inputs.skip_verify }}" = "true" ]; then ARGS="$ARGS --skip-verify"; fi
          if [ "${{ inputs.dry_run }}" = "true" ]; then ARGS="$ARGS --dry-run"; fi

          COUNTRIES="${{ inputs.countries }}"
          if [ -z "$COUNTRIES" ]; then COUNTRIES="za,ng"; fi
          echo "Will run: $COUNTRIES"

          FAILED=""
          IFS=',' read -ra LIST <<< "$COUNTRIES"
          for cc in "${LIST[@]}"; do
            cc=$(echo "$cc" | xargs)
            echo ""
            echo "======================================================================"
            echo "  STARTING country: $cc"
            echo "======================================================================"
            if python -m pipeline.gap_finder.main --country "$cc" --verbose $ARGS; then
              echo "✓ $cc completed"
            else
              echo "✗ $cc failed (continuing)"
              FAILED="$FAILED $cc"
            fi
          done

          if [ -n "$FAILED" ]; then
            echo ""
            echo "WARNING: Some countries failed:$FAILED"
          fi

      - name: Upload per-country artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: africa-gap-finder-run-${{ github.run_id }}
          path: |
            docs/data/gap_finder_za/
            docs/data/gap_finder_ng/
          retention-days: 14

      - name: Commit xlsx changes (race-safe)
        if: inputs.dry_run != 'true'
        run: |
          bash scripts/safe_push.sh "Africa gap finder: $(date -u +%Y-%m-%d) auto-update" docs/data/recalls.xlsx docs/data/gap_finder_za/ docs/data/gap_finder_ng/
