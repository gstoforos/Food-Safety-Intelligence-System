name: Scraper health audit

# Runs the full daily orchestrator AND a scraper-health audit afterward.
# If more than 33% of scrapers hard-failed, the run is marked FAILED so
# you see it in your Actions tab and email summary.
#
# Audit 2026-04-29: prior orchestrator runs silently masked wholesale
# scraper collapse. Output looked like "DONE in 161s" while 36/66
# scrapers were broken. This workflow ensures broken scrapers are
# visible the next morning.

on:
  workflow_dispatch:
    inputs:
      no_fail:
        description: "Report only — don't fail the run on threshold breach"
        type: boolean
        default: false
  # Scheduling is centralized in Apps Script (FsisScheduler.gs) which
  # dispatches this workflow every Sunday at 04:30 Athens.
  # No internal cron block — Apps Script is the single source of truth.

concurrency:
  group: fsis-data-writers
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      TZ: Europe/Athens
      # All AI keys; orchestrator may need any of them
      GEMINI_API_KEY_FREE:   ${{ secrets.GEMINI_API_KEY_FREE }}
      GEMINI_API_KEY_FREE_2: ${{ secrets.GEMINI_API_KEY_FREE_2 }}
      GEMINI_API_KEY:        ${{ secrets.GEMINI_API_KEY }}
      ANTHROPIC_API_KEY:     ${{ secrets.ANTHROPIC_API_KEY }}
      OPENAI_API_KEY:        ${{ secrets.OPENAI_API_KEY }}
      # Don't write back to Pending during audit — we just want diagnostics
      SKIP_COMMIT: "1"

    steps:
      - name: Hour guard
        run: |
          H=$(TZ=Europe/Athens date +%-H)
          # Weekly schedule means cron may fire at 04 or 05 depending on DST
          if [ "$H" != "4" ] && [ "$H" != "5" ] && [ -z "${{ github.event.inputs.no_fail }}" ]; then
            echo "Skipping non-04:00 run (current Athens hour=$H)"
            exit 0
          fi

      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          if [ -f requirements-additions.txt ]; then
            pip install -r requirements-additions.txt
          fi

      - name: Run scrapers, capture log
        id: run
        env:
          # Audit 2026-05-07: scraper health is a measurement workflow, not
          # a data-ingestion one. Run scrapers so we can see who's failing,
          # but do NOT enrich (enrich_row hallucinates Listeria onto non-
          # pathogen recalls), do NOT review, do NOT promote. Any new rows
          # land in Pending; the regular gate/check/merge chain handles them.
          SKIP_AI: "1"
          SKIP_REVIEW: "1"
          SKIP_PROMOTE: "1"
        run: |
          set +e   # don't fail here; we want the log even on partial failure
          python -m pipeline.run_all 2>&1 | tee /tmp/run.log
          rc=${PIPESTATUS[0]}
          echo "rc=$rc" >> "$GITHUB_OUTPUT"
          # Always continue to the audit step
          exit 0

      - name: Audit scraper health
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.no_fail }}" = "true" ]; then
            ARGS="--no-fail"
          fi
          python -m pipeline.scraper_health_audit --log /tmp/run.log $ARGS

      - name: Configure git
        if: always()
        run: |
          git config user.name  "fsis-health-bot"
          git config user.email "bot@advfood.tech"

      - name: Commit health report
        if: always()
        run: |
          if [[ -n "$(git status --porcelain docs/data/scraper-health.json)" ]]; then
            git add docs/data/scraper-health.json
            git commit -m "Scraper health: weekly audit"
            git pull --rebase --autostash || true
            git push
          else
            echo "No change in scraper-health.json"
          fi
