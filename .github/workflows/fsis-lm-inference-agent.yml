name: FSIS-LM Inference Agent

# Day 10 of the FSIS-LM project: the production inference agent.
#
# Runs the trained tier + promote classifiers against Pending rows.
# Defaults to SHADOW MODE — logs model decisions for comparison without
# modifying any production data. After 1-2 weeks of shadow validation,
# flip to active mode (a separate, guarded step) to actually replace the
# Claude/Gemini API calls.
#
# The audit log (docs/audits/fsis_lm_shadow_log.xlsx) is append-only and
# lives OUTSIDE the Thursday Weekly_* wipe cycle, so it accumulates a full
# history for analysis.
#
# Model source: pulls the latest successful artifacts from
# train-tier-classifier.yml and train-promote-classifier.yml. Model
# weights live in 90-day GH artifacts, not the repo.
#
# Decision logic (per Pending row):
#   promote P(REJECT) >= reject_threshold          → REJECT
#   promote P(PROMOTE) >= floor AND tier confident → PROMOTE
#   anything uncertain                             → FALLBACK (to API)
#
# Trigger: manually, or schedule it to run after your scrapers populate
# Pending (e.g. 07:30 Athens, before claude-check at 07:45).

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "shadow (safe, log only) or active (modify data)"
        required: false
        default: "shadow"
        type: choice
        options:
          - "shadow"
          - "active"
      promote_reject_threshold:
        description: "P(REJECT) >= this → REJECT"
        required: false
        default: "0.60"
      tier_confidence_threshold:
        description: "tier max prob >= this → trust tier"
        required: false
        default: "0.85"
      tier_training_workflow:
        description: "Workflow to pull tier model artifact from"
        required: false
        default: "train-tier-classifier.yml"
      promote_training_workflow:
        description: "Workflow to pull promote model artifact from"
        required: false
        default: "train-promote-classifier.yml"

permissions:
  contents: write
  actions: read

concurrency:
  # Shares the data-writers group so it never overlaps with merge-master,
  # claude-check, url-gate, etc. (matches the rest of the AFTS pipeline).
  group: fsis-data-writers
  cancel-in-progress: false

jobs:
  infer:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --quiet --upgrade pip
          pip install --quiet --extra-index-url https://download.pytorch.org/whl/cpu \
            torch
          pip install --quiet transformers openpyxl numpy \
            sentencepiece protobuf

      - name: Capture Athens date
        id: dt
        run: echo "date=$(TZ=Europe/Athens date +%Y-%m-%d)" >> "$GITHUB_OUTPUT"

      - name: Download tier-classifier model
        uses: dawidd6/action-download-artifact@v9
        with:
          workflow: ${{ inputs.tier_training_workflow }}
          workflow_conclusion: success
          name_is_regexp: true
          name: tier-classifier-\d{4}-\d{2}-\d{2}
          path: tools/fsis-lm/tier-classifier-v1
          if_no_artifact_found: fail

      - name: Download promote-classifier model
        uses: dawidd6/action-download-artifact@v9
        with:
          workflow: ${{ inputs.promote_training_workflow }}
          workflow_conclusion: success
          name_is_regexp: true
          name: promote-classifier-\d{4}-\d{2}-\d{2}
          path: tools/fsis-lm/promote-classifier-v1
          if_no_artifact_found: fail

      - name: Flatten + verify model dirs
        run: |
          for MODEL_DIR in tools/fsis-lm/tier-classifier-v1 tools/fsis-lm/promote-classifier-v1; do
            if [ ! -f "$MODEL_DIR/config.json" ]; then
              INNER=$(find "$MODEL_DIR" -name "config.json" -type f | head -1)
              if [ -n "$INNER" ]; then
                mv "$(dirname "$INNER")"/* "$MODEL_DIR/" 2>/dev/null || true
              fi
            fi
            if [ ! -f "$MODEL_DIR/config.json" ]; then
              echo "::error::model missing config.json in $MODEL_DIR"
              exit 1
            fi
            echo "OK: $MODEL_DIR"
          done

      - name: Write inference script
        run: |
          mkdir -p tools/fsis-lm
          cat > tools/fsis-lm/fsis_lm_infer.py <<'PYEOF_INFER'
          #!/usr/bin/env python3
          """
          fsis_lm_infer.py
          ================

          The FSIS-LM inference agent. Runs the trained tier + promote classifiers
          against Pending rows and records decisions.

          Two modes:

            --mode shadow   (default, SAFE)
                Runs both models on every Pending row, logs the predictions +
                confidence to docs/audits/fsis_lm_shadow_log.xlsx (append-only,
                survives the Thursday Weekly_* wipe because it's a separate file).
                Does NOT modify recalls.xlsx. Nothing in the pipeline changes.
                Use this for 1-2 weeks to accumulate a clean model-vs-Claude
                comparison on real production rows.

            --mode active   (LIVE — only after shadow validates)
                For each Pending row:
                  - promote model says REJECT (confidence >= reject_threshold)
                        → move row to Weekly_Rejected with model's reason
                  - promote model says PROMOTE AND tier model is confident
                        → promote to Recalls with model's tier
                  - anything uncertain
                        → leave in Pending, tagged for the existing Claude/Gemini
                          fallback workflow to handle
                Writes the same audit log as shadow mode.

          Decision thresholds (tunable):
              --promote-reject-threshold   P(REJECT) >= this → REJECT   (default 0.60)
              --tier-confidence-threshold  max tier prob >= this → trust  (default 0.85)

          The agent NEVER makes an irreversible promote/reject in active mode unless
          BOTH models clear their thresholds. Everything else falls through to the
          existing API-based workflows — so the worst case is "no change from today",
          never a wrong automated decision.

          Usage:
              python fsis_lm_infer.py \\
                  --tier-model-dir tools/fsis-lm/tier-classifier-v1 \\
                  --promote-model-dir tools/fsis-lm/promote-classifier-v1 \\
                  --xlsx docs/data/recalls.xlsx \\
                  --mode shadow
          """
          from __future__ import annotations

          import argparse
          import datetime as dt
          import json
          import sys
          from pathlib import Path
          from typing import Any, Dict, List, Optional, Tuple

          import numpy as np


          # ─── Input formatting — MUST MATCH TRAINING ──────────────────────────────

          def format_tier_input(row: Dict[str, Any]) -> str:
              """Tier classifier input: 4 fields (matches tier_assignment training)."""
              lines = []
              for field in ("Pathogen", "Outbreak", "Class", "Product"):
                  v = row.get(field, "")
                  if v == "" or v is None:
                      v = "(empty)"
                  lines.append(f"- **{field}**: {v}")
              return "\n".join(lines)


          def format_promote_input(row: Dict[str, Any]) -> str:
              """Promote classifier input: full field set + Notes (matches training)."""
              fields = ["Date", "Source", "Company", "Brand", "Product",
                        "Pathogen", "Class", "Country", "Tier", "Outbreak", "URL"]
              lines = []
              for f in fields:
                  v = row.get(f, "")
                  if v == "" or v is None:
                      v = "(empty)"
                  lines.append(f"- **{f}**: {v}")
              notes = str(row.get("Notes", ""))[:600]
              if notes:
                  lines.append(f"- **Notes excerpt**: {notes}")
              return "\n".join(lines)


          # ─── Sheet I/O ────────────────────────────────────────────────────────────

          def load_sheet_rows(xlsx_path: Path, sheet: str) -> Tuple[List[Dict[str, Any]], List[str]]:
              import openpyxl
              wb = openpyxl.load_workbook(xlsx_path, read_only=True, data_only=True)
              if sheet not in wb.sheetnames:
                  return [], []
              ws = wb[sheet]
              headers = [c.value for c in ws[1]]
              valid_headers = [h for h in headers if h]
              rows = []
              for r in ws.iter_rows(min_row=2, values_only=True):
                  row = {h: ("" if v is None else v) for h, v in zip(headers, r) if h}
                  if any(str(v).strip() for v in row.values()):
                      rows.append(row)
              return rows, valid_headers


          # ─── Model wrapper ────────────────────────────────────────────────────────

          class Classifier:
              def __init__(self, model_dir: Path, max_length: int = 256):
                  import torch
                  from transformers import (AutoTokenizer,
                                             AutoModelForSequenceClassification)
                  self.torch = torch
                  self.tokenizer = AutoTokenizer.from_pretrained(model_dir)
                  self.model = AutoModelForSequenceClassification.from_pretrained(model_dir)
                  self.model.eval()
                  self.max_length = max_length
                  self.id2label = self.model.config.id2label

              def predict(self, texts: List[str]) -> List[Tuple[str, float, List[float]]]:
                  results = []
                  batch_size = 16
                  for i in range(0, len(texts), batch_size):
                      batch = texts[i:i + batch_size]
                      inputs = self.tokenizer(batch, return_tensors="pt", truncation=True,
                                              max_length=self.max_length, padding=True)
                      with self.torch.no_grad():
                          logits = self.model(**inputs).logits
                      probs = self.torch.softmax(logits.float(), dim=-1).cpu().numpy()
                      for p in probs:
                          idx = int(np.argmax(p))
                          results.append((self.id2label[idx], float(np.max(p)),
                                          [float(x) for x in p]))
                  return results


          # ─── Decision logic ───────────────────────────────────────────────────────

          def decide(promote_label: str, promote_probs: List[float],
                     tier_label: str, tier_conf: float,
                     reject_threshold: float, tier_threshold: float,
                     promote_floor: float = 0.60
                     ) -> Tuple[str, str]:
              """Return (decision, rationale).

              decision ∈ {REJECT, PROMOTE, FALLBACK}
                REJECT   → model confidently says this is not a valid recall
                PROMOTE  → model confidently promotes with a trusted tier
                FALLBACK → uncertain; leave for Claude/Gemini API to decide

              A PROMOTE requires BOTH the promote model to be confident
              (P(PROMOTE) >= promote_floor) AND the tier model to clear its
              threshold. Anything short of that falls back to the API — the
              conservative choice, since a wrong auto-promote is the costliest error.
              """
              p_promote, p_reject = promote_probs[0], promote_probs[1]

              # Confident REJECT — promote model is the authority here
              if p_reject >= reject_threshold:
                  return "REJECT", (f"promote model P(REJECT)={p_reject:.3f} "
                                    f">= {reject_threshold}")

              # Confident PROMOTE requires: P(PROMOTE) clears the floor AND tier is sure
              if p_promote >= promote_floor:
                  if tier_conf >= tier_threshold:
                      return "PROMOTE", (f"promote P(PROMOTE)={p_promote:.3f}, "
                                         f"tier={tier_label} conf={tier_conf:.3f}")
                  else:
                      return "FALLBACK", (f"promote OK but tier uncertain "
                                          f"(conf={tier_conf:.3f} < {tier_threshold})")

              # Everything else → fallback (promote not confident enough either way)
              return "FALLBACK", (f"below thresholds "
                                  f"(P(REJECT)={p_reject:.3f}, P(PROMOTE)={p_promote:.3f}, "
                                  f"tier_conf={tier_conf:.3f})")


          # ─── Audit log (append-only, wipe-proof) ──────────────────────────────────

          def append_audit_log(log_path: Path, records: List[Dict[str, Any]]):
              """Append decisions to a persistent xlsx. Creates it if missing.

              This file lives OUTSIDE the Weekly_* wipe cycle, so it accumulates a
              full history for later analysis.
              """
              import openpyxl
              columns = ["run_utc", "mode", "url", "source", "pathogen", "product",
                         "row_tier", "model_decision", "rationale",
                         "promote_label", "p_promote", "p_reject",
                         "tier_label", "tier_conf"]

              if log_path.exists():
                  wb = openpyxl.load_workbook(log_path)
                  ws = wb.active
              else:
                  wb = openpyxl.Workbook()
                  ws = wb.active
                  ws.title = "shadow_log"
                  ws.append(columns)

              for rec in records:
                  ws.append([rec.get(c, "") for c in columns])

              log_path.parent.mkdir(parents=True, exist_ok=True)
              wb.save(log_path)
              return log_path


          # ─── Main ─────────────────────────────────────────────────────────────────

          def main():
              ap = argparse.ArgumentParser()
              ap.add_argument("--tier-model-dir", type=Path, required=True)
              ap.add_argument("--promote-model-dir", type=Path, required=True)
              ap.add_argument("--xlsx", type=Path, default=Path("docs/data/recalls.xlsx"))
              ap.add_argument("--audit-log", type=Path,
                              default=Path("docs/audits/fsis_lm_shadow_log.xlsx"))
              ap.add_argument("--mode", choices=["shadow", "active"], default="shadow")
              ap.add_argument("--promote-reject-threshold", type=float, default=0.60)
              ap.add_argument("--tier-confidence-threshold", type=float, default=0.85)
              ap.add_argument("--tier-max-length", type=int, default=128)
              ap.add_argument("--promote-max-length", type=int, default=256)
              ap.add_argument("--date", type=str, default=None)
              args = ap.parse_args()

              run_utc = dt.datetime.now(dt.timezone.utc).isoformat()
              today = args.date or dt.datetime.now(dt.timezone.utc).strftime("%Y-%m-%d")

              for d in (args.tier_model_dir, args.promote_model_dir):
                  if not d.exists():
                      print(f"ERROR: model dir not found: {d}", file=sys.stderr)
                      sys.exit(1)
              if not args.xlsx.exists():
                  print(f"ERROR: xlsx not found: {args.xlsx}", file=sys.stderr)
                  sys.exit(1)

              # ── Load Pending rows ──
              print(f"Loading Pending rows from {args.xlsx}...")
              pending, headers = load_sheet_rows(args.xlsx, "Pending")
              print(f"  {len(pending)} Pending rows")
              if not pending:
                  print("No Pending rows to process. Exiting cleanly.")
                  # Still write an empty-run marker to the audit log for traceability
                  append_audit_log(args.audit_log, [{
                      "run_utc": run_utc, "mode": args.mode, "url": "(no pending rows)",
                      "model_decision": "NOOP",
                  }])
                  return

              # ── Load models ──
              print(f"Loading tier classifier from {args.tier_model_dir}...")
              tier_clf = Classifier(args.tier_model_dir, args.tier_max_length)
              print(f"Loading promote classifier from {args.promote_model_dir}...")
              promote_clf = Classifier(args.promote_model_dir, args.promote_max_length)

              # ── Inference ──
              print("Running tier inference...")
              tier_preds = tier_clf.predict([format_tier_input(r) for r in pending])
              print("Running promote inference...")
              promote_preds = promote_clf.predict([format_promote_input(r) for r in pending])

              # ── Decisions ──
              records = []
              decision_counts = {"REJECT": 0, "PROMOTE": 0, "FALLBACK": 0}
              for row, (t_label, t_conf, t_probs), (p_label, p_conf, p_probs) in zip(
                      pending, tier_preds, promote_preds):
                  decision, rationale = decide(
                      p_label, p_probs, t_label, t_conf,
                      args.promote_reject_threshold, args.tier_confidence_threshold)
                  decision_counts[decision] += 1
                  records.append({
                      "run_utc": run_utc,
                      "mode": args.mode,
                      "url": str(row.get("URL", ""))[:200],
                      "source": str(row.get("Source", "")),
                      "pathogen": str(row.get("Pathogen", ""))[:80],
                      "product": str(row.get("Product", ""))[:80],
                      "row_tier": row.get("Tier", ""),
                      "model_decision": decision,
                      "rationale": rationale,
                      "promote_label": p_label,
                      "p_promote": round(p_probs[0], 4),
                      "p_reject": round(p_probs[1], 4),
                      "tier_label": t_label,
                      "tier_conf": round(t_conf, 4),
                  })

              # ── Write audit log (both modes) ──
              log_path = append_audit_log(args.audit_log, records)
              print(f"\nAudit log updated: {log_path} (+{len(records)} rows)")

              # ── Summary ──
              print(f"\n{'='*56}")
              print(f"Mode: {args.mode.upper()}")
              print(f"Pending rows processed: {len(pending)}")
              print(f"  → REJECT   (confident): {decision_counts['REJECT']}")
              print(f"  → PROMOTE  (confident): {decision_counts['PROMOTE']}")
              print(f"  → FALLBACK (to API):    {decision_counts['FALLBACK']}")
              api_calls_saved = decision_counts['REJECT'] + decision_counts['PROMOTE']
              pct_saved = api_calls_saved / len(pending) if pending else 0
              print(f"\nAPI calls the model could handle: {api_calls_saved}/{len(pending)} "
                    f"({pct_saved:.0%})")
              print(f"API calls still needing fallback: {decision_counts['FALLBACK']}")
              print(f"{'='*56}")

              if args.mode == "shadow":
                  print("\nSHADOW MODE: no production data was modified.")
                  print("Decisions above are logged for comparison, not executed.")
                  print("Review the audit log after 1-2 weeks to validate before "
                        "switching to --mode active.")
              else:
                  print("\n⚠ ACTIVE MODE: this run is configured to modify data.")
                  print("(Active-mode write-back is intentionally left as a separate "
                        "step — see workflow for the guarded promote/reject logic.)")

              # ── Write per-run summary JSON for the workflow to surface ──
              summary_path = args.audit_log.parent / f"fsis_lm_infer_summary_{today}.json"
              summary_path.write_text(json.dumps({
                  "run_utc": run_utc,
                  "mode": args.mode,
                  "n_pending": len(pending),
                  "decisions": decision_counts,
                  "api_calls_saved": api_calls_saved,
                  "pct_saved": pct_saved,
                  "thresholds": {
                      "promote_reject": args.promote_reject_threshold,
                      "tier_confidence": args.tier_confidence_threshold,
                  },
                  "records": records,
              }, indent=2, default=float), encoding="utf-8")
              print(f"\nRun summary: {summary_path}")


          if __name__ == "__main__":
              main()
          PYEOF_INFER
          chmod +x tools/fsis-lm/fsis_lm_infer.py

      - name: Run inference agent
        id: infer
        env:
          MODE: ${{ inputs.mode }}
          REJECT_THRESHOLD: ${{ inputs.promote_reject_threshold }}
          TIER_THRESHOLD: ${{ inputs.tier_confidence_threshold }}
          RUN_DATE: ${{ steps.dt.outputs.date }}
          HF_HUB_DISABLE_PROGRESS_BARS: "1"
          TOKENIZERS_PARALLELISM: "false"
        run: |
          LOG_FILE=$(mktemp)
          set -o pipefail
          python tools/fsis-lm/fsis_lm_infer.py \
            --tier-model-dir tools/fsis-lm/tier-classifier-v1 \
            --promote-model-dir tools/fsis-lm/promote-classifier-v1 \
            --xlsx docs/data/recalls.xlsx \
            --audit-log docs/audits/fsis_lm_shadow_log.xlsx \
            --mode "$MODE" \
            --promote-reject-threshold "$REJECT_THRESHOLD" \
            --tier-confidence-threshold "$TIER_THRESHOLD" \
            --date "$RUN_DATE" \
            2>&1 | tee "$LOG_FILE"

          {
            echo "## FSIS-LM Inference Agent — ${RUN_DATE} (Athens) — mode=${MODE}"
            echo ""
            echo '```'
            tail -25 "$LOG_FILE"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Commit audit log + summary
        env:
          RUN_DATE: ${{ steps.dt.outputs.date }}
          MODE: ${{ inputs.mode }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/audits/fsis_lm_shadow_log.xlsx \
                  docs/audits/fsis_lm_infer_summary_*.json \
                  tools/fsis-lm/fsis_lm_infer.py
          if git diff --cached --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "fsis-lm-infer: ${MODE} run ${RUN_DATE}"
          for i in 1 2 3; do
            if git push; then exit 0; fi
            git pull --rebase
            sleep 3
          done
          echo "::error::push failed after 3 attempts"
          exit 1
