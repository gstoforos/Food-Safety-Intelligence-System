name: FSIS DDGS Gap Finder (3rd deterministic finder)

# Daily at 02:00 ATHENS TIME — runs after the midnight LLM cascade
# (00:00 Athens) and before the 06:00 morning URL gate. Provides a
# fourth discovery layer alongside Tavily (22:00) and Exa (22:30).
#
# Backed by DuckDuckGo metasearch (aggregates Bing, Yandex, Brave's
# public results). NO API KEY, NO CREDIT CARD, NO MONTHLY CAP.
# Replaced the Brave API plan after Brave killed its free tier in
# Feb 2026.
#
# Pipeline: pipeline.gap_finder_ddgs unconditionally runs and submits
# findings to Pending. URL-based dedup at append_to_pending() means on
# days Tavily+Exa already covered everything, DDGS adds ~zero rows.
# On days those finders missed a regulator update, DDGS fills the gap.
#
# Cost: $0 — DDGS is free, no API key required.
# Risk: DDGS may rate-limit (HTTP 202) on shared GitHub Actions runner
# IPs. The module handles this gracefully (backend fallback + circuit
# breaker) and degrades to "0 rows added" rather than crashing.

on:
  workflow_dispatch:
    inputs:
      since_days:
        description: "Days to look back"
        required: false
        default: "7"

permissions:
  contents: write

concurrency:
  group: fsis-data-writers
  cancel-in-progress: false

jobs:
  gap-finder-ddgs:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Athens-time guard (01-04:xx window)
        id: guard
        run: |
          HOUR=$(TZ=Europe/Athens date +%H)
          echo "athens_hour=$HOUR"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            if [ "$HOUR" -ge "01" ] && [ "$HOUR" -le "04" ]; then
              echo "In scheduled 02:xx Athens window — allowing."
            else
              echo "Outside scheduled window (now ${HOUR}:xx) but manual dispatch — allowing."
            fi
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "Not a dispatch event."
          fi

      - name: Checkout
        if: steps.guard.outputs.run == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        if: steps.guard.outputs.run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        if: steps.guard.outputs.run == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # Ensure ddgs is present even if requirements.txt hasn't been
          # updated yet — defense-in-depth so the workflow never
          # breaks on a stale requirements file.
          pip install --upgrade "ddgs>=9.14"

      - name: Run DDGS gap-finder
        if: steps.guard.outputs.run == 'true'
        env:
          GAP_SINCE_DAYS: ${{ github.event.inputs.since_days || '7' }}
          SKIP_COMMIT:    "false"
          GH_TOKEN:       ${{ secrets.GITHUB_TOKEN }}
          GIT_USER_EMAIL: "fsis-bot@advfood.tech"
          GIT_USER_NAME:  "AFTS Intelligence System"
        run: |
          python -m pipeline.gap_finder_ddgs

      - name: Summary
        if: steps.guard.outputs.run == 'true' && always()
        run: |
          echo "DDGS gap-finder complete — Athens $(TZ=Europe/Athens date)."
