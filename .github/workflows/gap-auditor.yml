name: FSIS Gap Auditor

# Compares regulator APIs/RSS against docs/data/recalls.xlsx and reports
# what the pipeline missed, with root-cause classification per miss:
#   SCRAPER_DEAD, SCRAPER_FILTERED, URL_GATE_DROP, SCHEDULE_GAP,
#   NOT_IN_WHITELIST, TRULY_MISSING.
#
# Zero AI cost — pure HTTP + xlsx compare. Uploads gap_report_*.xlsx
# + .csv as a downloadable artifact.
#
# Runs weekly (Monday 11:00 Athens) and on manual dispatch.

on:
  workflow_dispatch:
    inputs:
      days:
        description: "Days to look back"
        required: false
        default: "7"
      start:
        description: "Start date YYYY-MM-DD (overrides days)"
        required: false
      end:
        description: "End date YYYY-MM-DD"
        required: false

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Athens-time guard (10-12:xx window)
        id: guard
        run: |
          HOUR=$(TZ=Europe/Athens date +%H)
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          elif [ "$HOUR" -ge "09" ] && [ "$HOUR" -le "15" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.guard.outputs.run == 'true'
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        if: steps.guard.outputs.run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        if: steps.guard.outputs.run == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run gap auditor
        if: steps.guard.outputs.run == 'true'
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.start }}" ]; then
            ARGS="--start ${{ github.event.inputs.start }}"
            if [ -n "${{ github.event.inputs.end }}" ]; then
              ARGS="$ARGS --end ${{ github.event.inputs.end }}"
            fi
          else
            ARGS="--days ${{ github.event.inputs.days || '7' }}"
          fi
          python -m pipeline.gap_auditor $ARGS | tee gap_audit_console.txt

      - name: Upload gap-audit artifact
        if: steps.guard.outputs.run == 'true' && always()
        uses: actions/upload-artifact@v4
        with:
          name: gap-audit-${{ github.run_id }}
          path: |
            gap_report_*.xlsx
            gap_report_*.csv
            gap_audit_console.txt
          retention-days: 30
