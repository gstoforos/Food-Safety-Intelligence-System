name: FSIS Gemini Gap Finder

# Daily at 14:00 ATHENS TIME — European morning catch-up.
# The ONLY gap-finder with live web access (Google Search grounding
# built into Gemini 2.0 Flash), so it catches recalls the others can't.
#
# Cost: $0 — runs on Gemini free tier.
#
# Two DST crons + Athens hour guard so the correct one fires year-round.

on:
  workflow_dispatch:
    inputs:
      since_days:
        description: "Days to look back"
        required: false
        default: "7"

permissions:
  contents: write

concurrency:
  group: fsis-data-writers
  cancel-in-progress: false

jobs:
  gap-finder-gemini:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Athens-time guard (13-15:xx window)
        id: guard
        run: |
          HOUR=$(TZ=Europe/Athens date +%H)
          echo "athens_hour=$HOUR"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          elif [ "$HOUR" -ge "12" ] && [ "$HOUR" -le "18" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "Not 08:xx Athens (now ${HOUR}:xx). Skipping."
          fi

      - name: Checkout
        if: steps.guard.outputs.run == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        if: steps.guard.outputs.run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        if: steps.guard.outputs.run == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Gemini gap-finder
        if: steps.guard.outputs.run == 'true'
        env:
          # Gemini: singular key (current AFTS setup) + numbered rotation slots.
          GEMINI_API_KEY:    ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY_1:  ${{ secrets.GEMINI_API_KEY_1 }}
          GEMINI_API_KEY_2:  ${{ secrets.GEMINI_API_KEY_2 }}
          GEMINI_API_KEY_3:  ${{ secrets.GEMINI_API_KEY_3 }}
          GEMINI_API_KEY_4:  ${{ secrets.GEMINI_API_KEY_4 }}
          GEMINI_API_KEY_5:  ${{ secrets.GEMINI_API_KEY_5 }}
          GAP_SINCE_DAYS:    ${{ github.event.inputs.since_days || '7' }}
          SKIP_COMMIT:       "false"
          GH_TOKEN:          ${{ secrets.GITHUB_TOKEN }}
          GIT_USER_EMAIL:    "fsis-bot@advfood.tech"
          GIT_USER_NAME:     "FSIS Bot"
        run: |
          python -m pipeline.gap_finder_gemini

          fi

      - name: Claude URL Gate + Merge
        if: steps.guard.outputs.run == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GIT_USER_EMAIL: "fsis-bot@advfood.tech"
          GIT_USER_NAME: "FSIS Bot"
        run: |
          python -m pipeline.url_gate_claude
          python -m pipeline.merge_master

      - name: Summary
        if: steps.guard.outputs.run == 'true' && always()
        run: |
          echo "Gemini gap-finder complete — Athens $(TZ=Europe/Athens date)."
          echo "Any new rows are in Pending; 07:30 Athens URL gate (next day) will promote."
