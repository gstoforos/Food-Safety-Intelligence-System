name: FSIS RASFF Scrape (EU Rapid Alert System)

# 2× daily Athens time:
#   04:30 → after morning-critical-scrape, before gemini-url-gate
#   16:30 → afternoon catch-up before evening daily-scrape
#
# Each run hits RASFF Window's public JSON API (no auth, no Playwright)
# and writes pathogen-matched rows to Pending. Typical runtime: 5-15s
# (1-3 paginated calls of ~30KB each).
#
# Architecture: uses the canonical AGENCIES_FILTER pattern from
# pipeline.run_all — same approach as morning-critical-scrape.yml — so
# the full enrichment, review, merge, and commit logic runs unchanged.
#
# Concurrency: shares the `fsis-data-writers` group with merge-master,
# url-gate, daily-recall-search, claude-check so writes to
# docs/data/recalls.xlsx never overlap.

on:
  workflow_dispatch:
    inputs:
      since_days:
        description: "Lookback window in days (default: 3 — see scrapers/eu_wide/rasff.py)"
        required: false
        default: "3"
      skip_commit:
        description: "true = run but do not commit/push (dry-run)"
        required: false
        default: "false"

permissions:
  contents: write

concurrency:
  group: fsis-data-writers
  cancel-in-progress: false

jobs:
  rasff-scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Athens-time guard (allows manual any hour;
                                  scheduled dispatch must be 04-05 or 16-17 Athens)
        id: guard
        run: |
          HOUR=$(TZ=Europe/Athens date +%H)
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "Dispatched at Athens ${HOUR}:xx — running."
          elif [ "$HOUR" = "04" ] || [ "$HOUR" = "05" ] || [ "$HOUR" = "16" ] || [ "$HOUR" = "17" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "Inside RASFF window (now ${HOUR}:xx Athens)."
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "Outside RASFF windows (04-05 / 16-17 Athens; now ${HOUR}:xx). Skipping."
          fi

      - name: Checkout
        if: steps.guard.outputs.run == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        if: steps.guard.outputs.run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        if: steps.guard.outputs.run == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run RASFF scraper via run_all (AGENCIES_FILTER)
        if: steps.guard.outputs.run == 'true'
        env:
          # Limit run_all to ONLY the RASFF scraper. AGENCY string must
          # match scrapers/eu_wide/rasff.py's RASFFScraper.AGENCY exactly.
          AGENCIES_FILTER:  "RASFF (EU)"
          SINCE_DAYS:       ${{ github.event.inputs.since_days || '3' }}
          SKIP_COMMIT:      ${{ github.event.inputs.skip_commit || 'false' }}
          # Skip AI enrichment + review for this fast 2x/day pass.
          # The morning-critical-scrape + claude-check pipelines re-process
          # any new RASFF rows when they next run.
          SKIP_AI:          "true"
          SKIP_REVIEW:      "true"
          SKIP_PROMOTE:     "1"   # Audit 2026-05-07: rows stay in Pending; merge-master.yml promotes.
          # Gemini keys not needed when SKIP_AI=true, but pass them through
          # in case run_all's enrichment imports require them at module level.
          GEMINI_API_KEY:    ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY_1:  ${{ secrets.GEMINI_API_KEY_1 }}
          GEMINI_API_KEY_2:  ${{ secrets.GEMINI_API_KEY_2 }}
          GEMINI_API_KEY_3:  ${{ secrets.GEMINI_API_KEY_3 }}
          GEMINI_MODEL:      ${{ vars.GEMINI_MODEL || 'gemini-2.5-flash' }}
          GH_TOKEN:          ${{ secrets.GITHUB_TOKEN }}
          GIT_USER_EMAIL:    "fsis-bot@advfood.tech"
          GIT_USER_NAME:     "AFTS Intelligence System"
        run: |
          python -m pipeline.run_all

      - name: Summary
        if: steps.guard.outputs.run == 'true' && always()
        run: |
          echo "RASFF scrape complete — Athens $(TZ=Europe/Athens date)"
          python -c "
          import openpyxl
          try:
              wb = openpyxl.load_workbook('docs/data/recalls.xlsx', read_only=True)
              for s in ['Recalls', 'Pending']:
                  if s in wb.sheetnames:
                      print(f'{s}: {wb[s].max_row - 1} rows')
          except Exception as e:
              print(f'(unreadable: {e})')
          "
