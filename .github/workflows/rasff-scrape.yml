name: FSIS RASFF Scrape (EU Rapid Alert System)

# 2× daily Athens time:
#   04:30 → after morning-critical-scrape, before gemini-url-gate
#   16:30 → afternoon catch-up before evening daily-scrape
#
# Each run downloads the public XLS export from RASFF Window
# (https://webgate.ec.europa.eu/rasff-window/services/excel),
# filters to last 7 days, food + alert/border/info-attention,
# and writes pathogen-matched rows to Pending. Typical runtime:
# ~5-15 seconds (the 30K-row XLS is ~3MB).
#
# Concurrency: shares the `fsis-data-writers` group with merge-master,
# url-gate, daily-recall-search, claude-check, openrouter-check so
# writes to docs/data/recalls.xlsx never overlap.

on:
  workflow_dispatch:
    inputs:
      since_days:
        description: "Lookback window in days (default: 7)"
        required: false
        default: "7"
      skip_commit:
        description: "true = run but do not commit/push (dry-run)"
        required: false
        default: "false"

permissions:
  contents: write

concurrency:
  group: fsis-data-writers
  cancel-in-progress: false

jobs:
  rasff-scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Athens-time guard (allows manual any hour;
                                  scheduled dispatch must be 04-05 or 16-17 Athens)
        id: guard
        run: |
          HOUR=$(TZ=Europe/Athens date +%H)
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "Dispatched at Athens ${HOUR}:xx — running."
          elif [ "$HOUR" = "04" ] || [ "$HOUR" = "05" ] || [ "$HOUR" = "16" ] || [ "$HOUR" = "17" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "Inside RASFF window (now ${HOUR}:xx Athens)."
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "Outside RASFF windows (04-05 / 16-17 Athens; now ${HOUR}:xx). Skipping."
          fi

      - name: Checkout
        if: steps.guard.outputs.run == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        if: steps.guard.outputs.run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        if: steps.guard.outputs.run == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run RASFF scraper standalone
        if: steps.guard.outputs.run == 'true'
        env:
          RASFF_SINCE_DAYS: ${{ github.event.inputs.since_days || '7' }}
          SKIP_COMMIT:      ${{ github.event.inputs.skip_commit || 'false' }}
          GH_TOKEN:         ${{ secrets.GITHUB_TOKEN }}
          GIT_USER_EMAIL:   "fsis-bot@advfood.tech"
          GIT_USER_NAME:    "AFTS Intelligence System"
        run: |
          # Run only the RASFF scraper (not the full 68-scraper sweep) and
          # merge results into Pending. This re-uses the orchestrator's
          # merge_master + commit logic via a focused entry point.
          python -c "
          import logging, os, sys
          sys.path.insert(0, '.')
          logging.basicConfig(
              level=logging.INFO,
              format='%(asctime)s [%(levelname)s] %(name)s: %(message)s',
          )

          from scrapers.eu_wide.rasff import RASFFScraper
          from pipeline.merge_master import (
              load_pending, append_to_pending, save_xlsx_with_pending,
              load_recalls,
          )
          from pipeline.commit_github import git_commit_and_push

          since = int(os.getenv('RASFF_SINCE_DAYS', '7'))
          skip_commit = os.getenv('SKIP_COMMIT', 'false').lower() == 'true'

          scraper = RASFFScraper()
          rows = scraper.scrape(since_days=since)
          print(f'RASFF scraper: {len(rows)} pathogen-matched rows extracted')

          if not rows:
              print('No new RASFF rows — skipping commit')
              sys.exit(0)

          recalls = load_recalls()
          pending = load_pending()
          n_added = append_to_pending(rows, pending, recalls)
          print(f'Append to Pending: +{n_added} new rows (after dedup)')

          if n_added == 0:
              print('All RASFF rows were duplicates — no commit needed')
              sys.exit(0)

          save_xlsx_with_pending(recalls, pending)

          if skip_commit:
              print('SKIP_COMMIT=true — not pushing')
              sys.exit(0)

          git_commit_and_push(
              message=f'RASFF scrape: +{n_added} rows to Pending',
              paths=['docs/data/recalls.xlsx'],
          )
          print(f'Committed and pushed {n_added} RASFF rows')
          "

      - name: Summary
        if: steps.guard.outputs.run == 'true' && always()
        run: |
          echo "RASFF scrape complete — Athens $(TZ=Europe/Athens date)"
          python -c "
          import openpyxl
          try:
              wb = openpyxl.load_workbook('docs/data/recalls.xlsx', read_only=True)
              for s in ['Recalls', 'Pending']:
                  if s in wb.sheetnames:
                      print(f'{s}: {wb[s].max_row - 1} rows')
          except Exception as e:
              print(f'(unreadable: {e})')
          "
