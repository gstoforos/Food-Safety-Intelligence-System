name: FSIS Claude Gap Finder

# ==========================================================================
# Claude web-search gap-finder — one region per run, 15 min apart.
# No rate limit issues since each run is a single API call (~40K tokens).
#
# Schedule (Athens time):
#   03:00 Europe
#   03:15 NorthAmerica
#   03:30 AsiaPacific
#   03:45 LATAM_ME_Africa
#   04:00 Morning scrape (separate workflow)
# ==========================================================================

on:
  schedule:
    # EEST (summer UTC+3)
    - cron: '0 0 * * *'
    - cron: '15 0 * * *'
    - cron: '30 0 * * *'
    - cron: '45 0 * * *'
    # EET (winter UTC+2)
    - cron: '0 1 * * *'
    - cron: '15 1 * * *'
    - cron: '30 1 * * *'
    - cron: '45 1 * * *'
  workflow_dispatch:
    inputs:
      region:
        description: "Europe, NorthAmerica, AsiaPacific, LATAM_ME_Africa, or ALL"
        required: false
        default: "ALL"
      since_days:
        description: "Days to look back"
        required: false
        default: "7"

permissions:
  contents: write

concurrency:
  group: fsis-data-writers
  cancel-in-progress: false

jobs:
  gap-finder:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Determine region from schedule
        id: region
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "region=${{ github.event.inputs.region || 'ALL' }}" >> "$GITHUB_OUTPUT"
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          HOUR=$(TZ=Europe/Athens date +%H)
          MIN=$(TZ=Europe/Athens date +%M)
          echo "athens=${HOUR}:${MIN}"

          if [ "$HOUR" != "02" ] && [ "$HOUR" != "03" ] && [ "$HOUR" != "04" ]; then
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "Not 03:xx Athens. Skipping."
            exit 0
          fi

          echo "run=true" >> "$GITHUB_OUTPUT"
          if [ "$MIN" -lt "10" ]; then
            echo "region=Europe" >> "$GITHUB_OUTPUT"
          elif [ "$MIN" -lt "25" ]; then
            echo "region=NorthAmerica" >> "$GITHUB_OUTPUT"
          elif [ "$MIN" -lt "40" ]; then
            echo "region=AsiaPacific" >> "$GITHUB_OUTPUT"
          else
            echo "region=LATAM_ME_Africa" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.region.outputs.run == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        if: steps.region.outputs.run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        if: steps.region.outputs.run == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Claude gap-finder (${{ steps.region.outputs.region }})
        if: steps.region.outputs.run == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GAP_SINCE_DAYS: ${{ github.event.inputs.since_days || '7' }}
          SKIP_COMMIT: "false"
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GIT_USER_EMAIL: "fsis-bot@advfood.tech"
          GIT_USER_NAME: "FSIS Bot"
        run: |
          REGION="${{ steps.region.outputs.region }}"
          if [ "$REGION" = "ALL" ]; then
            python -m pipeline.gap_finder_claude
          else
            python -m pipeline.gap_finder_claude --region "$REGION"
          fi

      - name: Claude URL Gate + Merge
        if: steps.region.outputs.run == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GIT_USER_EMAIL: "fsis-bot@advfood.tech"
          GIT_USER_NAME: "FSIS Bot"
        run: |
          python -m pipeline.url_gate_claude
          python -m pipeline.merge_master

      - name: Summary
        if: steps.region.outputs.run == 'true' && always()
        run: echo "Claude gap-finder (${{ steps.region.outputs.region }}) — Athens $(TZ=Europe/Athens date)"
