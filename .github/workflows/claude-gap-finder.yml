name: FSIS Claude Gap Finder

on:
  schedule:
    # Daily at 05:00 UTC — 1hr before OpenAI gap-finder (06:00),
    # well after the 17:00 scrape run. Both gap-finders feed Pending;
    # the 07:30 URL gate promotes rows only if the URL is live.
    - cron: '0 5 * * *'
  workflow_dispatch:
    inputs:
      since_days:
        description: "Days to look back"
        required: false
        default: "7"

permissions:
  contents: write

concurrency:
  group: fsis-data-writers
  cancel-in-progress: false

jobs:
  gap-finder-claude:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Claude gap-finder
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GAP_SINCE_DAYS: ${{ github.event.inputs.since_days || '7' }}
          SKIP_COMMIT: "false"
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GIT_USER_EMAIL: "fsis-bot@advfood.tech"
          GIT_USER_NAME: "FSIS Bot"
        run: |
          python -m pipeline.gap_finder_claude
