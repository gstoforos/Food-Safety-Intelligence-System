name: FSIS Claude Gap Finder

# All 4 regions in one run. Rate-limit delay between calls.
# Schedule: 03:00 Athens. Wide guard (02-08) for GitHub cron delays.

on:
  workflow_dispatch:
    inputs:
      region:
        description: "Europe, NorthAmerica, AsiaPacific, LATAM_ME_Africa, or ALL"
        required: false
        default: "ALL"

permissions:
  contents: write

concurrency:
  group: fsis-data-writers
  cancel-in-progress: false

jobs:
  gap-finder:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Athens-time guard (02-08 window)
        id: guard
        run: |
          HOUR=$(TZ=Europe/Athens date +%H)
          echo "athens_hour=$HOUR"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          elif [ "$HOUR" -ge "02" ] && [ "$HOUR" -le "08" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "Not 02-08 Athens (now ${HOUR}:xx). Skipping."
          fi

      - name: Checkout
        if: steps.guard.outputs.run == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        if: steps.guard.outputs.run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        if: steps.guard.outputs.run == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Claude gap-finder
        if: steps.guard.outputs.run == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SKIP_COMMIT: "false"
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GIT_USER_EMAIL: "fsis-bot@advfood.tech"
          GIT_USER_NAME: "FSIS Bot"
        run: |
          REGION="${{ github.event.inputs.region || 'ALL' }}"
          if [ "$REGION" = "ALL" ]; then
            for R in Europe NorthAmerica AsiaPacific LATAM_ME_Africa; do
              echo "=== Region: $R ==="
              python -m pipeline.gap_finder_claude --region "$R" || true
              echo "Waiting 65s for rate limit..."
              sleep 65
            done
          else
            python -m pipeline.gap_finder_claude --region "$REGION"
          fi

      - name: Claude URL Gate + Merge
        if: steps.guard.outputs.run == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GIT_USER_EMAIL: "fsis-bot@advfood.tech"
          GIT_USER_NAME: "FSIS Bot"
        run: |
          python -m pipeline.url_gate_claude
          python -m pipeline.merge_master

      - name: Summary
        if: steps.guard.outputs.run == 'true' && always()
        run: echo "Claude gap-finder done — Athens $(TZ=Europe/Athens date)"
