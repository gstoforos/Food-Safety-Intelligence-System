name: FSIS Daily Run

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        required: false
        default: "incremental"
        type: choice
        options:
          - incremental
          - full
          - report-only
          - enrich-only

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore database from repo
        run: |
          mkdir -p data
          if [ -f data/fsis_fda.db ]; then
            cp data/fsis_fda.db fsis_fda.db
            echo "DB restored: $(du -h fsis_fda.db | cut -f1)"
          else
            echo "No DB found - fresh start"
          fi

      - name: Run agent (incremental)
        if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'incremental')
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENFDA_API_KEY: ${{ secrets.OPENFDA_API_KEY }}
        run: python main.py

      - name: Run agent (full re-pull)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'full'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENFDA_API_KEY: ${{ secrets.OPENFDA_API_KEY }}
        run: python main.py --full

      - name: Run agent (report only)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'report-only'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python main.py --report-only

      - name: Run agent (enrich only)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'enrich-only'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python main.py --enrich-only

      - name: Save database to repo
        run: |
          mkdir -p data
          if [ -f fsis_fda.db ]; then
            cp fsis_fda.db data/fsis_fda.db
            echo "DB saved: $(du -h data/fsis_fda.db | cut -f1)"
          fi

      - name: Commit report and database
        run: |
          git config user.name  "FSIS Bot"
          git config user.email "bot@advfood.tech"
          git add docs/index.html data/fsis_fda.db
          git diff --staged --quiet || git commit -m "auto-update $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
