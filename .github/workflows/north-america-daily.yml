name: FSIS North America Daily Scrape (FDA + USDA + CFIA)

# ============================================================================
# Dedicated daily scrape for the three high-priority North American
# regulators. Runs SEPARATELY from morning-critical-scrape.yml (04:00) and
# daily-scrape.yml (17:00) to give an independent failure signal and
# additional within-day cadence.
#
# WHY A DEDICATED NA WORKFLOW (audit 2026-05-09)
# ----------------------------------------------
# In April–early May 2026 the FDA RSS scraper was returning HTTP 404 from
# Akamai bot detection for ~3 weeks while the news scrapers and openFDA
# kept running. The workflow logs filed a "0 rows" warning every run but
# nothing alerted — the failure was buried inside the 13-agency morning
# pass (one healthy agency was enough to mask the FDA blackout).
#
# Splitting NA out:
#   1. Different failure signal in GitHub Actions ("North America Daily"
#      goes red while morning-critical stays green → instantly visible).
#   2. Three layers of FDA redundancy run together:
#        L1  scrapers/north_america/fda_datatables.py   ← canonical source
#        L2  scrapers/north_america/fda_press.py        ← RSS feed
#        L3  scrapers/north_america/fda.py              ← openFDA (5–30d lag)
#      All three share Source="FDA"; merge_master URL-dedupes across them.
#      A single-source outage can no longer hide a recall for >24h.
#   3. Higher cadence — runs at 13:00 Athens (after morning chain finishes
#      and before the 17:00 full-fleet sweep). Catches FDA recalls
#      published during US East Coast morning (≈ 14:00–17:00 Athens).
#
# SCHEDULE (Athens time)
# ----------------------
# Scheduler: dispatched by FsisScheduler.gs (Google Apps Script) at 13:00
# Athens. Same workflow_dispatch pattern as morning-critical-scrape.yml
# and rasff-scrape.yml — no GitHub native cron; the App Script knows the
# DST offset.
#
# Time guard inside the workflow: 11–14 Athens window for scheduled
# dispatches; manual dispatches always run.
#
# COUPLING WITH OTHER WORKFLOWS
# -----------------------------
# Concurrency group `fsis-data-writers` shared with merge-master, url-gate,
# claude-check, and other writers — guarantees no overlapping writes to
# docs/data/recalls.xlsx.
#
# Like morning-critical and rasff-scrape, this is SCRAPE-ONLY: rows land
# in Pending. Promotion to Recalls happens via the scheduled gate/check/
# merge chain (gemini-url-gate → claude-check → merge-master).
# ============================================================================

on:
  workflow_dispatch:
    inputs:
      since_days:
        description: "Lookback window in days (default: 7 — covers FDA publication lag and short outages)"
        required: false
        default: "7"
      skip_commit:
        description: "true = run but do not commit/push (dry-run)"
        required: false
        default: "false"

permissions:
  contents: write

concurrency:
  group: fsis-data-writers
  cancel-in-progress: false

jobs:
  na-scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Athens-time guard (11–14 window for the 13:00 fire)
        id: guard
        run: |
          HOUR=$(TZ=Europe/Athens date +%H)
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ github.event.inputs.since_days }}" != "" ]; then
            # Manual dispatch with explicit since_days = operator override; always run.
            echo "run=true" >> "$GITHUB_OUTPUT"
            echo "Manual dispatch (since_days=${{ github.event.inputs.since_days }}) at Athens ${HOUR}:xx — running."
          elif [ "$HOUR" -ge "11" ] && [ "$HOUR" -le "14" ]; then
            echo "run=true"  >> "$GITHUB_OUTPUT"
            echo "Inside NA window (now ${HOUR}:xx Athens)."
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "Outside NA window (11–14 Athens; now ${HOUR}:xx). Skipping."
          fi

      - name: Checkout
        if: steps.guard.outputs.run == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        if: steps.guard.outputs.run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        if: steps.guard.outputs.run == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Scrape NA-only (SCRAPE-ONLY — rows land in Pending)
        if: steps.guard.outputs.run == 'true'
        env:
          # AGENCIES_FILTER limits run_all to ONLY these three agencies.
          # Strings must match each scraper's AGENCY class attr exactly.
          # FDA covers all three FDA scrapers (datatables L1, press-release
          # L2, openFDA L3) since they all set AGENCY = "FDA". merge_master
          # dedupes by URL across them.
          AGENCIES_FILTER:  "FDA,USDA FSIS,CFIA"

          # 7-day lookback — wide enough to absorb any 3–5 day FDA outage
          # without losing recalls when service comes back.
          SINCE_DAYS:       ${{ github.event.inputs.since_days || '7' }}
          SKIP_COMMIT:      ${{ github.event.inputs.skip_commit || 'false' }}

          # SCRAPE-ONLY MODE — same pattern as morning-critical-scrape.yml.
          # SKIP_AI=1       → no Gemini enrichment pass
          # SKIP_REVIEW=1   → no URL gate, no Claude review
          # SKIP_PROMOTE=1  → no Pending→Recalls; promotion is the merge-master chain's job
          SKIP_AI:          "1"
          SKIP_REVIEW:      "1"
          SKIP_PROMOTE:     "1"

          # Gemini keys not needed when SKIP_AI=true, but pass through in
          # case run_all imports the enrichment module at module load.
          GEMINI_API_KEY:    ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY_1:  ${{ secrets.GEMINI_API_KEY_1 }}
          GEMINI_API_KEY_2:  ${{ secrets.GEMINI_API_KEY_2 }}
          GEMINI_API_KEY_3:  ${{ secrets.GEMINI_API_KEY_3 }}
          GEMINI_MODEL:      ${{ vars.GEMINI_MODEL || 'gemini-2.5-flash' }}

          GIT_USER_EMAIL: "fsis-bot@advfood.tech"
          GIT_USER_NAME:  "AFTS Intelligence System"
        run: |
          python -m pipeline.run_all

      - name: Loud-fail if all FDA layers returned 0 rows
        if: steps.guard.outputs.run == 'true'
        # The whole point of L1+L2+L3 redundancy is that a 0-row result
        # across all three is now a real alarm, not a false positive.
        # Inspect the run_all log written to the previous step's stdout.
        # We grep for the per-scraper row counts (logged by run_all as
        # "scraper.fda*: <N> rows") and fail the workflow if FDA totals
        # to zero AND USDA+CFIA also zero — meaning every NA layer dark.
        #
        # On a typical day this step is a no-op. On the day FDA's edge
        # changes again, this step turns the workflow red and emails
        # the operator within minutes.
        run: |
          set -e
          # Exit 0 if there's nothing to evaluate (e.g. SKIP_COMMIT dry run).
          if [ ! -f /tmp/fsis-run.log ]; then
            echo "no log file — skipping health check"
            exit 0
          fi
          FDA_TOTAL=$(grep -E "scraper\.(fda|fda_press|fda_datatables): [0-9]+" /tmp/fsis-run.log | awk '{print $NF}' | paste -sd+ | bc || echo 0)
          USDA_TOTAL=$(grep -E "scraper\.usda" /tmp/fsis-run.log | awk '{print $NF}' | paste -sd+ | bc || echo 0)
          CFIA_TOTAL=$(grep -E "scraper\.cfia" /tmp/fsis-run.log | awk '{print $NF}' | paste -sd+ | bc || echo 0)
          echo "Health summary: FDA=$FDA_TOTAL USDA=$USDA_TOTAL CFIA=$CFIA_TOTAL"
          # Total-zero across every layer for >24h is the actionable failure.
          # Single 0 is normal (slow news day).
          # Triple 0 means our 3 NA regulators are all dark = either
          # network/auth issue on our side or coordinated outage on theirs.
          if [ "$FDA_TOTAL" = "0" ] && [ "$USDA_TOTAL" = "0" ] && [ "$CFIA_TOTAL" = "0" ]; then
            echo "::error::All three NA regulators returned 0 rows — investigate immediately."
            exit 1
          fi

      - name: Summary
        if: steps.guard.outputs.run == 'true' && always()
        run: |
          echo "NA daily scrape complete — Athens $(TZ=Europe/Athens date)."
          echo "Rows landed in Pending. The 06:00 / 17:00 / 19:00 gate+check+merge"
          echo "cycles will promote them to Recalls."
