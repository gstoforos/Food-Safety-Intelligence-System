name: FSIS Claude URL Gate

on:
  schedule:
    # Daily at 07:30 UTC — after gap-finder (06:00), before weekly report (08:00 Fri)
    - cron: '30 7 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: fsis-data-writers
  cancel-in-progress: false

jobs:
  url-gate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Claude URL gate
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SKIP_COMMIT: "false"
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GIT_USER_EMAIL: "fsis-bot@advfood.tech"
          GIT_USER_NAME: "FSIS Bot"
        run: |
          python -m pipeline.url_gate_claude
