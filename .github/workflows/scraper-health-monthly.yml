name: Scraper health monthly email

# Generates the 30-day scraper health report + commits HTML/TXT files
# to docs/data/. The Apps Script (FsisScheduler.gs / afts_monthly_mailer.gs)
# picks up the latest scraper-health-monthly-{YYYY-MM}.html and emails it
# alongside the regular monthly intelligence report on the 1st of each month.

on:
  workflow_dispatch:
    inputs: {}
  # Scheduling is centralized in Apps Script (FsisScheduler.gs) which
  # dispatches this workflow on Day-1 at 06:00 Athens — BEFORE the
  # afts-monthly-report.yml fires at 09:00 — so HTML/TXT files are
  # committed and ready to read by the monthly report builder.
  # No internal cron block — Apps Script is the single source of truth.

concurrency:
  group: scraper-health-monthly
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      TZ: Europe/Athens
      GEMINI_API_KEY_FREE:   ${{ secrets.GEMINI_API_KEY_FREE }}
      GEMINI_API_KEY_FREE_2: ${{ secrets.GEMINI_API_KEY_FREE_2 }}
      GEMINI_API_KEY:        ${{ secrets.GEMINI_API_KEY }}
      ANTHROPIC_API_KEY:     ${{ secrets.ANTHROPIC_API_KEY }}
      OPENAI_API_KEY:        ${{ secrets.OPENAI_API_KEY }}
      SKIP_COMMIT: "1"

    steps:
      - name: Hour guard (Athens 06:00 only)
        run: |
          H=$(TZ=Europe/Athens date +%-H)
          if [ "$H" != "6" ] && [ "$H" != "5" ] && [ "$H" != "7" ] && \
             [ -z "${{ github.event.inputs }}" ]; then
            echo "Skipping non-06:00 fire (current Athens hour=$H)"
            exit 0
          fi

      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          if [ -f requirements-additions.txt ]; then
            pip install -r requirements-additions.txt
          fi

      - name: Run scrapers, capture full log
        id: run
        env:
          # Audit 2026-05-07: scrape so we can audit health, but block
          # enrichment hallucination + claude review + promotion. New rows
          # land in Pending; the regular gate/check/merge chain handles them.
          SKIP_AI: "1"
          SKIP_REVIEW: "1"
          SKIP_PROMOTE: "1"
        run: |
          set +e
          python -m pipeline.run_all 2>&1 | tee /tmp/run.log
          rc=${PIPESTATUS[0]}
          echo "rc=$rc" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Audit scraper health (writes scraper-health.json)
        run: |
          python -m pipeline.scraper_health_audit --log /tmp/run.log --no-fail

      - name: Build monthly HTML+TXT report
        run: |
          python -m pipeline.scraper_health_monthly

      - name: Configure git
        run: |
          git config user.name  "fsis-health-bot"
          git config user.email "bot@advfood.tech"

      - name: Commit + push reports
        run: |
          git add docs/data/scraper-health.json \
                  docs/data/scraper-health-monthly-*.html \
                  docs/data/scraper-health-monthly-*.txt
          if git diff --cached --quiet; then
            echo "No changes — skipping commit"
          else
            git commit -m "Scraper health: monthly report $(date +%Y-%m)"
            git pull --rebase --autostash || true
            git push
          fi
