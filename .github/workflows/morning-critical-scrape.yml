name: FSIS Morning Critical-Agency Scrape

# Runs at 05:00 UTC (08:00 Athens) every day.
# Targets only the 12 highest-volume / highest-severity agencies that
# together produce ~70% of Tier-1 recalls. Purpose: cut worst-case alert
# latency from ~24h to ~12h for the agencies that matter most to
# subscribers, without doubling the full 66-scraper API load.
#
# The full 66-scraper pass still runs at 17:00 UTC via daily-scrape.yml.
# This morning pass re-scrapes the critical-12 subset only.

on:
  schedule:
    - cron: '0 5 * * *'         # 05:00 UTC daily
  workflow_dispatch:
    inputs:
      since_days:
        description: "Days to look back"
        required: false
        default: "7"

permissions:
  contents: write

concurrency:
  group: fsis-data-writers      # same lock group as daily-scrape so the two never collide
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run critical-12 subset scrape
        env:
          # Same secrets as daily-scrape.yml
          GEMINI_API_KEY_1: ${{ secrets.GEMINI_API_KEY_1 }}
          GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
          GEMINI_API_KEY_3: ${{ secrets.GEMINI_API_KEY_3 }}
          GEMINI_API_KEY_4: ${{ secrets.GEMINI_API_KEY_4 }}
          GEMINI_API_KEY_5: ${{ secrets.GEMINI_API_KEY_5 }}
          OPENAI_API_KEY:    ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

          # The 12 agencies that produce the bulk of Tier-1 pathogen recalls.
          # Matches the AGENCY attribute set on each BaseScraper subclass.
          AGENCIES_FILTER: "FDA,USDA FSIS,CFIA,RASFF (EU),FSA (UK),RappelConso (FR),BVL (DE),AESAN (ES),AGES (AT),FSANZ (AU),MPI (NZ),EFET (GR)"

          # Shorter lookback — we're filling a 12-hour gap, not rebuilding history
          SINCE_DAYS: ${{ github.event.inputs.since_days || '7' }}

          # Still commit — this is a live data-writing run like daily-scrape
          SKIP_COMMIT: "false"

          GIT_USER_EMAIL: "fsis-bot@advfood.tech"
          GIT_USER_NAME:  "AFTS Intelligence System"
        run: |
          python -m pipeline.run_all

      - name: Summary
        if: always()
        run: |
          echo "Morning scrape complete — next full scrape at 17:00 UTC."
