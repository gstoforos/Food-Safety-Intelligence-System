name: FSIS Morning Critical-Agency Scrape

# Morning 12-agency scrape at 08:00 ATHENS TIME (not UTC).
# Pairs with daily-scrape.yml which runs the full 66-agency pass at
# 17:00 Athens. This morning pass cuts Tier-1 alert latency from ~24h
# to ~12h for the agencies that produce the bulk of recalls, without
# doubling the full API load.
#
# Two DST crons + hour guard so it always fires at 08:00 Athens
# regardless of DST offset.

on:
  schedule:
    - cron: '0 5 * * *'   # 08:00 Athens EEST (summer UTC+3)
    - cron: '0 6 * * *'   # 08:00 Athens EET  (winter UTC+2)
  workflow_dispatch:
    inputs:
      since_days:
        description: "Days to look back"
        required: false
        default: "7"

permissions:
  contents: write

concurrency:
  group: fsis-data-writers
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Athens-time guard (08:xx)
        id: guard
        run: |
          HOUR=$(TZ=Europe/Athens date +%H)
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          elif [ "$HOUR" = "08" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "Not 08:xx Athens (now ${HOUR}:xx). Skipping."
          fi

      - name: Checkout
        if: steps.guard.outputs.run == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        if: steps.guard.outputs.run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        if: steps.guard.outputs.run == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run critical-12 subset scrape
        if: steps.guard.outputs.run == 'true'
        env:
          GEMINI_API_KEY_1: ${{ secrets.GEMINI_API_KEY_1 }}
          GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
          GEMINI_API_KEY_3: ${{ secrets.GEMINI_API_KEY_3 }}
          GEMINI_API_KEY_4: ${{ secrets.GEMINI_API_KEY_4 }}
          GEMINI_API_KEY_5: ${{ secrets.GEMINI_API_KEY_5 }}
          OPENAI_API_KEY:    ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          AGENCIES_FILTER: "FDA,USDA FSIS,CFIA,RASFF (EU),FSA (UK),RappelConso (FR),BVL (DE),AESAN (ES),AGES (AT),FSANZ (AU),MPI (NZ),EFET (GR)"
          SINCE_DAYS:  ${{ github.event.inputs.since_days || '7' }}
          SKIP_COMMIT: "false"
          GIT_USER_EMAIL: "fsis-bot@advfood.tech"
          GIT_USER_NAME:  "AFTS Intelligence System"
        run: |
          python -m pipeline.run_all

      - name: Summary
        if: steps.guard.outputs.run == 'true' && always()
        run: |
          echo "Morning scrape complete — Athens $(TZ=Europe/Athens date)."
          echo "Next full pass at 17:00 Athens via daily-scrape.yml."
