name: FSIS Merge Master (hourly)

# ==========================================================================
# Runs every hour at :05 minutes past — merges the Pending sheet into the
# Recalls sheet of docs/data/recalls.xlsx. Offset by 5 min so it doesn't
# collide with the :00 URL gate / news workflows.
#
# This is the ONLY path by which Pending rows become published Recalls.
# The weekly + monthly report builders read the Recalls sheet only, so
# nothing hits subscribers without first passing through this merge.
# ==========================================================================

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: fsis-data-writers
  cancel-in-progress: false

jobs:
  merge:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run merge_master (Pending → Recalls)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GIT_USER_EMAIL: "fsis-bot@advfood.tech"
          GIT_USER_NAME:  "AFTS Intelligence System"
        run: |
          python -m pipeline.merge_master

      - name: Commit merged workbook (if changed)
        run: |
          git config --local user.email "fsis-bot@advfood.tech"
          git config --local user.name  "AFTS Intelligence System"
          git add docs/data/recalls.xlsx docs/data/recalls.json || true
          if git diff --staged --quiet; then
            echo "No merge changes this hour."
            exit 0
          fi
          COMMIT_MSG="chore(data): hourly Pending→Recalls merge $(TZ=Europe/Athens date +%H:%M)"
          git commit -m "$COMMIT_MSG"

          # Safe push retry — row-level union merge instead of binary overwrite.
          # (Old "binary-safe retry" silently destroyed remote rows that were
          # added between our checkout and our push, e.g. an operator's
          # manual recalls.xlsx upload.)
          for attempt in 1 2 3; do
            if git push; then
              echo "Push succeeded on attempt $attempt."
              exit 0
            fi
            echo "Push attempt $attempt failed — safe row-level merge retry..."
            cp docs/data/recalls.xlsx /tmp/our-recalls.xlsx
            git reset --hard HEAD~1
            git pull --ff-only origin main || git pull origin main
            # Union our just-merged xlsx with the freshly-pulled remote
            python -m pipeline.xlsx_merge \
              docs/data/recalls.xlsx /tmp/our-recalls.xlsx docs/data/recalls.xlsx
            # Regenerate the json mirror from the merged xlsx
            python -c "from pathlib import Path; \
                       from pipeline.merge_master import mirror_json_from_xlsx; \
                       mirror_json_from_xlsx(Path('docs/data/recalls.xlsx'), \
                                              Path('docs/data/recalls.json'))" \
              || echo "(json regen warning; continuing)"
            git add docs/data/recalls.xlsx docs/data/recalls.json || true
            if ! git diff --staged --quiet; then
              git commit -m "$COMMIT_MSG (retry $attempt, row-merged)"
            fi
            sleep $((attempt * 3))
          done
          echo "ERROR: git push failed after 3 attempts."
          exit 1
