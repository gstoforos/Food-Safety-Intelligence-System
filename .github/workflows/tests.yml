name: tests

# Run the pytest suite on every push to main and every pull request.
# This is your only way to see test results, since the repo is online-only.
#
# GREEN: All tests pass — safe to merge / deploy.
# RED:   At least one test failed — DO NOT merge until fixed.
#
# Result shows up:
#   - In the "Actions" tab of the repo
#   - As a checkmark / X on every commit in the file list
#   - As a status check on every PR
#
# Audit 2026-05-13.

on:
  push:
    branches: [main]
    # Skip when only docs/data/* files changed — those are data updates from
    # the pipeline, not code changes that could break tests. Saves Actions
    # minutes since the pipeline writes to docs/data/ hundreds of times/week.
    paths-ignore:
      - 'docs/data/**'
      - 'docs/*.html'
      - 'docs/daily-*.html'
      - 'docs/2026-*.html'
  pull_request:
    branches: [main]
  workflow_dispatch:   # allow manual run from the Actions tab

# Don't run two test suites against the same SHA in parallel — wastes minutes.
concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # Install production deps so test imports of pipeline.* work.
          pip install -r requirements.txt
          # Install test-only deps (pytest, freezegun, pytest-mock).
          pip install -r requirements-dev.txt

      - name: Run pytest
        run: pytest -v

      - name: Test summary
        if: always()
        run: |
          echo "Tests finished. See above for the per-test report."
          echo "If anything is red, do NOT merge until it's fixed."
