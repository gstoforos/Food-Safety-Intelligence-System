name: Oceania official-feed collector

# Runs the FSANZ (Australia) and MPI/NZFS (New Zealand) collectors at 09:00
# local time in each country. Local times are enforced via TZ-guarded gate
# steps (the standing rule: never schedule by UTC, always by local time).
#
# Both countries' DST schedules are independent — Australia/Sydney runs
# AEDT (UTC+11, Oct→Apr) and AEST (UTC+10, Apr→Oct). Pacific/Auckland runs
# NZDT (UTC+13, Sep→Apr) and NZST (UTC+12, Apr→Sep). To hit 09:00 local in
# both regimes we list four UTC cron lines and let each job's TZ gate
# decide whether THIS particular run is the right hour for THAT country.

on:
  schedule:
    # Australia 09:00 Sydney — winter (AEST UTC+10) = 23 UTC prev day
    - cron: '0 23 * * *'
    # Australia 09:00 Sydney — summer (AEDT UTC+11) = 22 UTC prev day
    - cron: '0 22 * * *'
    # New Zealand 09:00 Auckland — winter (NZST UTC+12) = 21 UTC prev day
    - cron: '0 21 * * *'
    # New Zealand 09:00 Auckland — summer (NZDT UTC+13) = 20 UTC prev day
    - cron: '0 20 * * *'
  workflow_dispatch:
    inputs:
      sources:
        description: 'Comma-separated sources (default: both)'
        default: 'australia,new_zealand'
        required: false
      dry_run:
        description: 'Dry run (no xlsx write)'
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: oceania-feeds-collector
  cancel-in-progress: false

jobs:
  # ─── AUSTRALIA: FSANZ — runs only when local Sydney hour is 09 ─────────
  australia:
    name: FSANZ Australia (09:00 Australia/Sydney)
    runs-on: ubuntu-latest
    env:
      TZ: Australia/Sydney
    steps:
      - name: Hour gate (only run at 09:00 Australia/Sydney)
        id: gate
        run: |
          HOUR=$(TZ=Australia/Sydney date +%H)
          echo "Sydney local hour: $HOUR"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "manual=1" >> $GITHUB_OUTPUT
            echo "Manual dispatch — bypassing hour gate"
          elif [ "$HOUR" = "09" ]; then
            echo "manual=0" >> $GITHUB_OUTPUT
            echo "Hour matches — proceeding"
          else
            echo "skip=1" >> $GITHUB_OUTPUT
            echo "Hour does not match — this cron line is for a different country"
            exit 0
          fi

      - uses: actions/checkout@v4
        if: steps.gate.outputs.skip != '1'
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        if: steps.gate.outputs.skip != '1'
        with:
          python-version: '3.11'

      - name: Install dependencies
        if: steps.gate.outputs.skip != '1'
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 openpyxl python-dateutil

      - name: Run FSANZ collector
        if: steps.gate.outputs.skip != '1'
        env:
          SOURCES: ${{ github.event.inputs.sources || 'australia' }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: |
          # Filter to Australian sources only (NZ is handled by its own job)
          AU_SOURCES=$(echo "$SOURCES" | tr ',' '\n' | grep -E '^australia$' | paste -sd, -)
          if [ -z "$AU_SOURCES" ]; then
            echo "No Australian sources requested for this job — exiting cleanly."
            exit 0
          fi
          DRY_FLAG=""
          if [ "$DRY_RUN" = "true" ]; then DRY_FLAG="--dry-run"; fi
          # main.py takes --source (singular), one per invocation — loop
          echo "$AU_SOURCES" | tr ',' '\n' | while read -r SRC; do
            [ -z "$SRC" ] && continue
            echo "── Running source: $SRC ──"
            python -m pipeline.official_feeds.main \
              --source "$SRC" \
              --max-age-days 30 \
              $DRY_FLAG
          done

      - name: Commit + push xlsx changes
        if: steps.gate.outputs.skip != '1' && github.event.inputs.dry_run != 'true'
        run: |
          git config user.name  "afts-bot"
          git config user.email "afts-bot@users.noreply.github.com"
          if git diff --quiet docs/data/recalls.xlsx; then
            echo "No xlsx changes to commit."
            exit 0
          fi
          git add docs/data/recalls.xlsx
          git commit -m "FSANZ Australia recall feed — $(TZ=Australia/Sydney date +'%Y-%m-%d %H:%M %Z')"
          git push

  # ─── NEW ZEALAND: MPI/NZFS — runs only when local Auckland hour is 09 ──
  new_zealand:
    name: MPI New Zealand (09:00 Pacific/Auckland)
    runs-on: ubuntu-latest
    env:
      TZ: Pacific/Auckland
    steps:
      - name: Hour gate (only run at 09:00 Pacific/Auckland)
        id: gate
        run: |
          HOUR=$(TZ=Pacific/Auckland date +%H)
          echo "Auckland local hour: $HOUR"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "manual=1" >> $GITHUB_OUTPUT
            echo "Manual dispatch — bypassing hour gate"
          elif [ "$HOUR" = "09" ]; then
            echo "manual=0" >> $GITHUB_OUTPUT
            echo "Hour matches — proceeding"
          else
            echo "skip=1" >> $GITHUB_OUTPUT
            echo "Hour does not match — this cron line is for a different country"
            exit 0
          fi

      - uses: actions/checkout@v4
        if: steps.gate.outputs.skip != '1'
        with:
          fetch-depth: 1

      - uses: actions/setup-python@v5
        if: steps.gate.outputs.skip != '1'
        with:
          python-version: '3.11'

      - name: Install dependencies
        if: steps.gate.outputs.skip != '1'
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 openpyxl python-dateutil

      - name: Run MPI/NZFS collector
        if: steps.gate.outputs.skip != '1'
        env:
          SOURCES: ${{ github.event.inputs.sources || 'new_zealand' }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: |
          NZ_SOURCES=$(echo "$SOURCES" | tr ',' '\n' | grep -E '^new_zealand$' | paste -sd, -)
          if [ -z "$NZ_SOURCES" ]; then
            echo "No New Zealand sources requested for this job — exiting cleanly."
            exit 0
          fi
          DRY_FLAG=""
          if [ "$DRY_RUN" = "true" ]; then DRY_FLAG="--dry-run"; fi
          # main.py takes --source (singular), one per invocation — loop
          echo "$NZ_SOURCES" | tr ',' '\n' | while read -r SRC; do
            [ -z "$SRC" ] && continue
            echo "── Running source: $SRC ──"
            python -m pipeline.official_feeds.main \
              --source "$SRC" \
              --max-age-days 30 \
              $DRY_FLAG
          done

      - name: Commit + push xlsx changes
        if: steps.gate.outputs.skip != '1' && github.event.inputs.dry_run != 'true'
        run: |
          git config user.name  "afts-bot"
          git config user.email "afts-bot@users.noreply.github.com"
          if git diff --quiet docs/data/recalls.xlsx; then
            echo "No xlsx changes to commit."
            exit 0
          fi
          git add docs/data/recalls.xlsx
          git commit -m "MPI NZ recall feed — $(TZ=Pacific/Auckland date +'%Y-%m-%d %H:%M %Z')"
          git push
